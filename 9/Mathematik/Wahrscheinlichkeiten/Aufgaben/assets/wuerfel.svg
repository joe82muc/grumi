<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" role="img" aria-labelledby="title desc">
  <title id="title">Würfel und Ereigniskarten</title>
  <desc id="desc">Ein Würfel mit sechs Augen und mehrere Ereigniskarten.</desc>
  <rect width="520" height="280" rx="24" fill="#f8fafc"/>
  <g transform="translate(56 58)">
    <rect x="0" y="0" width="150" height="150" rx="28" fill="#fff" stroke="#334155" stroke-width="4"/>
    <circle cx="42" cy="42" r="10" fill="#1f2937"/>
    <circle cx="75" cy="42" r="10" fill="#1f2937"/>
    <circle cx="108" cy="42" r="10" fill="#1f2937"/>
    <circle cx="42" cy="108" r="10" fill="#1f2937"/>
    <circle cx="75" cy="108" r="10" fill="#1f2937"/>
    <circle cx="108" cy="108" r="10" fill="#1f2937"/>
  </g>
  <g font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">
    <rect x="248" y="36" width="218" height="42" rx="10" fill="#ecfdf5" stroke="#86efac"/>
    <text x="266" y="63">Augenzahl ist gerade</text>
    <rect x="248" y="91" width="218" height="42" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="266" y="118">Augenzahl ist größer 4</text>
    <rect x="248" y="146" width="218" height="42" rx="10" fill="#fff7ed" stroke="#fdba74"/>
    <text x="266" y="173">Augenzahl ist Primzahl</text>
    <rect x="248" y="201" width="218" height="42" rx="10" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="266" y="228">Augenzahl ist 1 oder 6</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 430" role="img" aria-labelledby="title desc">
  <title id="title">Roulette Experiment mit zehn Drehungen</title>
  <desc id="desc">Vorlage zum Notieren von zehn Roulette-Drehungen mit Einsatz, Ergebnis und Guthaben.</desc>
  <rect width="680" height="430" rx="24" fill="#f8fafc"/>
  <g font-family="Montserrat, Arial, sans-serif">
    <text x="34" y="48" font-size="24" font-weight="800" fill="#1f2937">Experiment: 10 Drehungen</text>
    <text x="34" y="78" font-size="16" font-weight="600" fill="#475569">Setze jedes Mal 1 Euro auf Rot.</text>

    <g transform="translate(48 112)">
      <rect x="0" y="0" width="584" height="238" rx="14" fill="#fff" stroke="#d6dee8" stroke-width="2"/>
      <g font-size="14" font-weight="800" fill="#1f2937">
        <text x="24" y="32">Drehung</text>
        <text x="140" y="32">Ergebnis</text>
        <text x="292" y="32">+ / -</text>
        <text x="456" y="32">Guthaben</text>
      </g>
      <g stroke="#e2e8f0" stroke-width="2">
        <line x1="0" y1="48" x2="584" y2="48"/>
        <line x1="112" y1="0" x2="112" y2="238"/>
        <line x1="264" y1="0" x2="264" y2="238"/>
        <line x1="424" y1="0" x2="424" y2="238"/>
        <line x1="0" y1="86" x2="584" y2="86"/>
        <line x1="0" y1="124" x2="584" y2="124"/>
        <line x1="0" y1="162" x2="584" y2="162"/>
        <line x1="0" y1="200" x2="584" y2="200"/>
      </g>
      <g font-size="15" font-weight="700" fill="#475569">
        <text x="42" y="73">1</text>
        <text x="42" y="111">2</text>
        <text x="42" y="149">3</text>
        <text x="42" y="187">...</text>
        <text x="38" y="225">10</text>
        <text x="142" y="73">Rot?</text>
        <text x="142" y="111">Rot?</text>
        <text x="142" y="149">Rot?</text>
        <text x="142" y="187">...</text>
        <text x="142" y="225">Rot?</text>
        <text x="300" y="73">+1 / -1</text>
        <text x="300" y="111">+1 / -1</text>
        <text x="300" y="149">+1 / -1</text>
        <text x="300" y="187">...</text>
        <text x="300" y="225">+1 / -1</text>
        <text x="462" y="73">99 - 101</text>
        <text x="462" y="111">...</text>
        <text x="462" y="149">...</text>
        <text x="462" y="187">...</text>
        <text x="462" y="225">Endstand</text>
      </g>
    </g>

    <g transform="translate(48 370)">
      <rect x="0" y="0" width="584" height="42" rx="10" fill="#fff7ed" stroke="#fdba74"/>
      <text x="18" y="18" font-size="13" font-weight="800" fill="#7c2d12">Wichtig:</text>
      <text x="78" y="18" font-size="13" font-weight="700" fill="#7c2d12">Bei nur 10 Drehungen kann das Ergebnis stark schwanken.</text>
      <text x="78" y="34" font-size="13" font-weight="700" fill="#7c2d12">Die berechnete Chance zeigt, was langfristig zu erwarten ist.</text>
    </g>
  </g>
</svg>

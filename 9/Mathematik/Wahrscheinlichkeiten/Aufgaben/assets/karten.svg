    <text x="0" y="76" font-size="30" fill="#dc2626">♥  ♦</text>
    <text x="86" y="76" font-size="30" fill="#111827">♠  ♣</text>
    <text x="0" y="120" font-size="15" fill="#475569">Eine Karte wird zufällig gezogen.</text>
  </g>

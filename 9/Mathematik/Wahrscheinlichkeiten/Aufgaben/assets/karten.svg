<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" role="img" aria-labelledby="title desc">
  <title id="title">Skatkarten zum Ziehen</title>
  <desc id="desc">Ein Stapel mit Spielkarten und Beispielkarten Herz, Karo, Pik und Kreuz.</desc>
  <rect width="520" height="300" rx="24" fill="#f7fbff"/>
  <g transform="translate(70 48)">
    <rect x="60" y="22" width="96" height="142" rx="12" fill="#e2e8f0" stroke="#64748b" stroke-width="3" transform="rotate(10 108 93)"/>
    <rect x="44" y="12" width="96" height="142" rx="12" fill="#fff" stroke="#334155" stroke-width="3" transform="rotate(2 92 83)"/>
    <rect x="28" y="22" width="96" height="142" rx="12" fill="#fff" stroke="#334155" stroke-width="3" transform="rotate(-9 76 93)"/>
    <text x="58" y="67" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#dc2626">A</text>
    <text x="58" y="111" font-family="Georgia, serif" font-size="44" fill="#dc2626">♥</text>
  </g>
  <g transform="translate(244 78)" font-family="Montserrat, Arial, sans-serif" font-weight="700">
    <text x="0" y="0" font-size="18" fill="#1f2937">Skatspiel: 32 Karten</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 430" role="img" aria-labelledby="title desc">
  <title id="title">Roulette Gewinnchancen</title>
  <desc id="desc">Uebersicht zum europaeischen Roulette mit 37 Feldern: 0, 18 rote Felder und 18 schwarze Felder.</desc>
  <rect width="680" height="430" rx="24" fill="#f8fafc"/>
  <g font-family="Montserrat, Arial, sans-serif">
    <text x="34" y="48" font-size="24" font-weight="800" fill="#1f2937">Europaeisches Roulette</text>
    <text x="34" y="78" font-size="16" font-weight="600" fill="#475569">Ein Feld von 37 moeglichen Feldern wird getroffen.</text>

    <g transform="translate(54 116)">
      <rect x="0" y="0" width="86" height="86" rx="14" fill="#16a34a"/>
      <text x="43" y="40" text-anchor="middle" font-size="28" font-weight="900" fill="#fff">0</text>
      <text x="43" y="64" text-anchor="middle" font-size="13" font-weight="800" fill="#dcfce7">1 Feld</text>
    </g>

    <g transform="translate(166 116)">
      <rect x="0" y="0" width="220" height="86" rx="14" fill="#dc2626"/>
      <text x="110" y="40" text-anchor="middle" font-size="28" font-weight="900" fill="#fff">Rot</text>
      <text x="110" y="64" text-anchor="middle" font-size="13" font-weight="800" fill="#fee2e2">18 Felder</text>
    </g>

    <g transform="translate(412 116)">
      <rect x="0" y="0" width="220" height="86" rx="14" fill="#111827"/>
      <text x="110" y="40" text-anchor="middle" font-size="28" font-weight="900" fill="#fff">Schwarz</text>
      <text x="110" y="64" text-anchor="middle" font-size="13" font-weight="800" fill="#e5e7eb">18 Felder</text>
    </g>

    <g transform="translate(54 238)">
      <rect x="0" y="0" width="578" height="124" rx="16" fill="#ffffff" stroke="#d6dee8" stroke-width="2"/>
      <text x="22" y="34" font-size="18" font-weight="800" fill="#0d6a54">Merke</text>
      <text x="22" y="66" font-size="16" font-weight="700" fill="#1f2937">Wahrscheinlichkeit = guenstige Felder / alle Felder</text>
      <text x="22" y="98" font-size="16" font-weight="700" fill="#1f2937">Beispiel Rot: 18 / 37 = ca. 48,6 %</text>
      <text x="380" y="98" font-size="16" font-weight="700" fill="#1f2937">Beispiel 0: 1 / 37</text>
    </g>

    <g transform="translate(54 382)" font-size="13" font-weight="700" fill="#64748b">
      <text x="0" y="0">Die 0 ist gruen und gehoert nicht zu Rot, Schwarz, Gerade oder Ungerade.</text>
    </g>
  </g>
</svg>

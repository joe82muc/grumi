      <circle cx="-44" cy="98" r="16" fill="#60a5fa"/>
      <circle cx="-8" cy="100" r="16" fill="#60a5fa"/>
      <circle cx="28" cy="100" r="16" fill="#facc15"/>
      <text x="0" y="164" font-size="14" fill="#475569">2 rot, 2 grün, 1 gelb, 2 blau</text>
    </g>

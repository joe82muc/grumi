<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img" aria-labelledby="title desc">
  <title id="title">Drei Schalen mit farbigen Kugeln</title>
  <desc id="desc">Drei Schalen A, B und C mit unterschiedlich vielen roten, grünen, gelben und blauen Kugeln.</desc>
  <rect width="640" height="300" rx="24" fill="#f8fafc"/>
  <g font-family="Montserrat, Arial, sans-serif" font-weight="700" text-anchor="middle">
    <g transform="translate(106 78)">
      <text x="0" y="-30" font-size="22" fill="#1f2937">A</text>
      <ellipse cx="0" cy="96" rx="82" ry="26" fill="#dbeafe" stroke="#64748b" stroke-width="3"/>
      <path d="M-82 96 Q0 154 82 96" fill="#bfdbfe" opacity=".55"/>
      <circle cx="-46" cy="62" r="16" fill="#ef4444"/>
      <circle cx="-12" cy="56" r="16" fill="#ef4444"/>
      <circle cx="24" cy="62" r="16" fill="#22c55e"/>
      <circle cx="54" cy="82" r="16" fill="#facc15"/>
      <circle cx="-42" cy="98" r="16" fill="#60a5fa"/>
      <circle cx="-6" cy="96" r="16" fill="#22c55e"/>
      <circle cx="28" cy="100" r="16" fill="#facc15"/>
      <text x="0" y="164" font-size="14" fill="#475569">2 rot, 2 grün, 2 gelb, 1 blau</text>
    </g>
    <g transform="translate(320 78)">

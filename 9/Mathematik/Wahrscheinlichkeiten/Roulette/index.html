<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roulette drehen</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="table-top" aria-label="Roulette Spiel">
        <div class="wheel-area">
          <div class="wheel-frame">
            <div class="pointer" aria-hidden="true"></div>
            <canvas id="wheel" width="620" height="620" aria-label="Roulette Rad"></canvas>
            <div class="wheel-hub">
              <span id="winningNumber">?</span>
            </div>
          </div>
          <button id="spinButton" class="spin-button" type="button">Drehen</button>
        </div>

        <aside class="status-panel" aria-label="Spielstand">
          <div>
            <p class="label">Guthaben</p>
            <p id="balance" class="money">100</p>
          </div>
          <div>
            <p class="label">Aktueller Einsatz</p>
            <p id="currentBet" class="money">0</p>
          </div>
          <div>
            <p class="label">Letzter Gewinn</p>
            <p id="lastWin" class="money win">0</p>
          </div>
          <div id="message" class="message" role="status">Wähle einen Einsatz und setze auf Zahlen oder Felder.</div>
          <div class="actions">
            <button id="clearBets" class="secondary-button" type="button">Einsätze löschen</button>
            <button id="resetGame" class="secondary-button" type="button">Neu starten</button>
          </div>
        </aside>
      </section>

      <section class="controls" aria-label="Einsätze">
        <div class="chips" aria-label="Einsatz auswählen">
          <button class="chip is-active" type="button" data-chip="1">1€</button>
          <button class="chip" type="button" data-chip="2">2€</button>
          <button class="chip" type="button" data-chip="5">5€</button>
          <button class="chip" type="button" data-chip="10">10€</button>
        </div>

        <div class="roulette-table">
          <button class="number zero" type="button" data-bet-type="number" data-bet-value="0">0</button>
          <div id="numberGrid" class="number-grid" aria-label="Zahlenfeld"></div>
          <div class="outside-bets">
            <button type="button" data-bet-type="range" data-bet-value="low">1-18</button>
            <button type="button" data-bet-type="parity" data-bet-value="even">Gerade</button>
            <button type="button" data-bet-type="color" data-bet-value="red">Rot</button>
            <button type="button" data-bet-type="color" data-bet-value="green">Grün</button>
            <button type="button" data-bet-type="color" data-bet-value="black">Schwarz</button>
            <button type="button" data-bet-type="parity" data-bet-value="odd">Ungerade</button>
            <button type="button" data-bet-type="range" data-bet-value="high">19-36</button>
          </div>
        </div>
      </section>

      <section class="history-panel" aria-label="Verlauf">
        <h2>Verlauf</h2>
        <div id="history" class="history"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | NT Quali 2026</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="auth.js" defer></script>
<script src="https://joe82muc.github.io/grumi/js/site-auth.js" data-grumi-auth="required"></script>
</head>
<body class="login-page">
  <main class="login-main">
    <section class="card detail-card login-card">
      <h1>NT Lernplattform Login</h1>


      <form id="loginForm" class="login-form" autocomplete="off">
        <label for="username">Benutzername</label>
        <input id="username" name="username" type="text" required />

        <label for="password">Passwort</label>
        <input id="password" name="password" type="password" required />

        <button class="btn primary" type="submit">Anmelden</button>
      </form>

      <p id="loginError" class="login-error" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>

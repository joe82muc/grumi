<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arbeitsblatt | NT Quali 2026</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="auth.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="brand-wrap">
      <p class="brand-kicker">Mittelschule am Sportpark</p>
      <h1>Arbeitsblatt Natur und Technik</h1>
      <p class="subtitle" id="ab-topic">Thema wird geladen...</p>
    </div>
    <nav class="main-nav" aria-label="Navigation">
      <a href="index.html">Zur Startseite</a>
      <a href="#" onclick="window.print(); return false;">Drucken</a>
    </nav>
  </header>

  <main class="ab-main">
    <section class="card ab-card">
      <h2 id="ab-title">Thema</h2>
      <p id="ab-pages" class="topic-meta"></p>
      <p id="ab-version" class="topic-meta"></p>
      <div id="ab-exercises"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const thema = params.get("thema") || "Unbekanntes Thema";
    const seiten = params.get("seiten") || "-";
    const ab = params.get("ab") || "1";

    const variants = {
      "1": [
        ["Aufgabe 1: Grundwissen", "Erkläre den Kerninhalt des Themas in 4 bis 6 vollständigen Sätzen."],
        ["Aufgabe 2: Begriffe", "Notiere 6 Fachbegriffe und schreibe zu jedem einen Merksatz."],
        ["Aufgabe 3: Fragen zum Text", "Formuliere 3 eigene Prüfungsfragen und beantworte sie schriftlich."],
        ["Selbstcheck", "Erkläre das Thema in 60 Sekunden mündlich ohne Hilfe."]
      ],
      "2": [
        ["Aufgabe 1: Ursachen und Folgen", "Stelle in einer Tabelle Ursachen, Ablauf und Folgen dar."],
        ["Aufgabe 2: Bildauswertung", "Beschreibe ein passendes Bild genau und nenne 3 wichtige Beobachtungen."],
        ["Aufgabe 3: Bewertung", "Bewerte Maßnahmen und begründe deine Meinung mit Fachbegriffen."],
        ["Selbstcheck", "Kannst du das Thema mit 5 Schlüsselwörtern frei erklären?"]
      ],
      "3": [
        ["Aufgabe 1: Transfer", "Finde ein Beispiel aus dem Alltag und erkläre den Bezug zum Thema."],
        ["Aufgabe 2: Argumentation", "Formuliere Pro- und Contra-Argumente und ziehe ein eigenes Fazit."],
        ["Aufgabe 3: Mini-Quiz", "Schreibe 5 Quizfragen mit Lösung für einen Mitschüler."],
        ["Selbstcheck", "Welche 3 Punkte musst du für den Quali sicher können?"]
      ]
    };

    document.getElementById("ab-title").textContent = thema;
    document.getElementById("ab-topic").textContent = `Arbeitsblatt zu: ${thema}`;
    document.getElementById("ab-pages").textContent = `Buchseiten: ${seiten}`;
    document.getElementById("ab-version").textContent = `Version: AB${ab}`;

    const container = document.getElementById("ab-exercises");
    const tasks = variants[ab] || variants["1"];

    tasks.forEach(([title, text]) => {
      const box = document.createElement("div");
      box.className = "exercise";
      box.innerHTML = `<h3>${title}</h3><p>${text}</p>`;
      container.appendChild(box);
    });
  </script>
</body>
</html>

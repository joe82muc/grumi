<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WiB Quiz - 60 Fragen</title>
  <style>
    :root {
      --bg-a: #eef7ff;
      --bg-b: #fff7ea;
      --card: #ffffff;
      --ink: #13233d;
      --muted: #4c5f7f;
      --line: #cfe0ff;
      --ok: #1f8b4c;
      --bad: #bf2f2f;
      --accent: #0f6ac6;
      --shadow: 0 12px 34px rgba(16, 42, 86, 0.13);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 7% 8%, #d8e7ff 0%, transparent 40%),
        radial-gradient(circle at 92% 88%, #ffe0bf 0%, transparent 36%),
        linear-gradient(140deg, var(--bg-a), var(--bg-b));
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 1rem 0.9rem 2.2rem; }
    .hero {
      border-radius: 22px;
      padding: 1.1rem 1.1rem 1rem;
      background: linear-gradient(130deg, #0b5db5, #2f82d8 54%, #f2a04a);
      color: #fff;
      box-shadow: var(--shadow);
    }
    h1 { margin: 0; line-height: 1.15; font-size: clamp(1.3rem, 3.2vw, 2.35rem); }
    .sub { margin: 0.5rem 0 0; opacity: 0.96; font-size: 1rem; }
    .hint { margin: 0.5rem 0 0; font-size: 0.95rem; font-weight: 700; }
    .panel {
      margin-top: 0.95rem;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 0.95rem;
      box-shadow: var(--shadow);
    }
    .progress { margin: 0 0 0.6rem; font-size: 0.95rem; color: var(--muted); font-weight: 700; }
    .score-live { margin: 0 0 0.8rem; font-size: 0.95rem; font-weight: 700; color: #1a3f74; }
    .q-title { margin: 0; font-size: clamp(1.05rem, 2.4vw, 1.32rem); line-height: 1.35; }
    .q-image-wrap { margin-top: 0.7rem; display: none; }
    .q-image {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      border: 1px solid #c8dcff;
      border-radius: 12px;
      background: #f7fbff;
      padding: 0.3rem;
    }
    .choices { margin-top: 0.8rem; display: grid; gap: 0.52rem; }
    .opt {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      border: 1px solid #d6e4ff;
      border-radius: 12px;
      padding: 0.58rem 0.62rem;
      background: #f8fbff;
      cursor: pointer;
    }
    .opt input { margin-top: 0.1rem; width: 18px; height: 18px; accent-color: var(--accent); flex: 0 0 auto; }
    .actions { margin-top: 0.85rem; display: flex; flex-wrap: wrap; gap: 0.55rem; }
    button { border: 0; border-radius: 11px; padding: 0.62rem 0.86rem; font: inherit; font-weight: 700; cursor: pointer; }
    .primary { background: linear-gradient(180deg, #1d79d5, #0f62ba); color: #fff; }
    .secondary { background: linear-gradient(180deg, #ffe7ca, #ffd6a6); color: #683300; }
    .feedback { margin-top: 0.7rem; min-height: 1.2em; font-weight: 700; }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .result { margin-top: 0.9rem; border-top: 1px dashed #b9cdf5; padding-top: 0.85rem; display: none; }
    .result h2 { margin: 0; font-size: 1.26rem; }
    .result p { margin: 0.45rem 0 0; color: #283f65; font-weight: 700; }
    @media (max-width: 620px) {
      .wrap { padding: 0.75rem 0.65rem 1.55rem; }
      .hero { border-radius: 16px; padding: 0.9rem; }
      .panel { border-radius: 14px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>WiB Quiz: Banken und Zahlungsverkehr (60 Fragen)</h1>
      <p class="sub">Auf Basis der Dateien Fragen S.90-105 + Lernskript.</p>
      <p class="hint">Wertung: 1 Punkt nur bei komplett richtiger Frage (alle richtigen, keine falschen). Es gibt Fragen mit 2 oder 3 richtigen Antworten. Danach folgt Runde 2 mit allen falschen Fragen.</p>
    </section>

    <section class="panel">
      <p class="progress" id="progress"></p>
      <p class="score-live" id="scoreLive"></p>
      <h2 class="q-title" id="question"></h2>
      <div class="q-image-wrap" id="imgWrap">
        <img class="q-image" id="qImg" src="" alt="Quiz-Bild">
      </div>
      <form id="quizForm" class="choices"></form>

      <div class="actions">
        <button class="primary" id="checkBtn" type="button">Antwort prüfen</button>
        <button class="secondary" id="nextBtn" type="button" disabled>Nächste Frage</button>
        <button class="secondary" id="restartBtn" type="button" style="display:none;">Quiz neu starten</button>
      </div>

      <p class="feedback" id="feedback"></p>

      <div class="result" id="resultBox">
        <h2>Ergebnis</h2>
        <p id="resultText"></p>
      </div>
    </section>
  </main>

    // Mischt die Antwortreihenfolge pro Frage und passt die richtigen Indizes an.
    function shuffleQuestionOptions() {
      questions.forEach((q) => {
        const tagged = q.options.map((text, idx) => ({ text, ok: q.correct.includes(idx) }));
        for (let i = tagged.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [tagged[i], tagged[j]] = [tagged[j], tagged[i]];
        }
        q.options = tagged.map((x) => x.text);
        q.correct = tagged
          .map((x, idx) => (x.ok ? idx : -1))
          .filter((idx) => idx !== -1);
      });
    }
    shuffleQuestionOptions();

    const totalQuestions = questions.length;
    const maxPoints = totalQuestions;

    let round = 1;
    let activeIndexes = questions.map((_, i) => i);
    let wrongFromRound1 = [];
    let current = 0;
    let totalPoints = 0;
    let checked = false;

    const progressEl = document.getElementById("progress");
    const scoreLiveEl = document.getElementById("scoreLive");
    const questionEl = document.getElementById("question");
    const formEl = document.getElementById("quizForm");
    const imgWrap = document.getElementById("imgWrap");
    const qImg = document.getElementById("qImg");
    const feedbackEl = document.getElementById("feedback");
    const checkBtn = document.getElementById("checkBtn");
    const nextBtn = document.getElementById("nextBtn");
    const restartBtn = document.getElementById("restartBtn");
    const resultBox = document.getElementById("resultBox");
    const resultText = document.getElementById("resultText");

    function updateLiveScore() {
      scoreLiveEl.textContent = `Punkte aktuell: ${totalPoints} / ${maxPoints}`;
    }

    function markWrongForRound2(qIndex) {
      if (round === 1 && !wrongFromRound1.includes(qIndex)) {
        wrongFromRound1.push(qIndex);
      }
    }

    function renderQuestion() {
      checked = false;
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      nextBtn.disabled = false;
      resultBox.style.display = "none";

      const qIndex = activeIndexes[current];
      const item = questions[qIndex];
      progressEl.textContent = `Runde ${round}: Frage ${current + 1} von ${activeIndexes.length}`;
      questionEl.textContent = item.q;

      if (item.img) {
        imgWrap.style.display = "block";
        qImg.src = item.img;
      } else {
        imgWrap.style.display = "none";
        qImg.src = "";
      }

      formEl.innerHTML = "";
      item.options.forEach((text, idx) => {
        const label = document.createElement("label");
        label.className = "opt";
        label.innerHTML = `<input type="checkbox" name="answer" value="${idx}"><span>${text}</span>`;
        formEl.appendChild(label);
      });

      updateLiveScore();
    }

    function selectedIndexes() {
      return Array.from(formEl.querySelectorAll("input[name='answer']:checked")).map((el) => Number(el.value));
    }

    function sameSet(a, b) {
      if (a.length !== b.length) return false;
      const sa = [...a].sort((x, y) => x - y);
      const sb = [...b].sort((x, y) => x - y);
      return sa.every((v, i) => v === sb[i]);
    }

    function checkAnswer() {
      if (checked) return;

      const picked = selectedIndexes();
      if (picked.length === 0) {
        feedbackEl.textContent = "Bitte wähle mindestens eine Antwort aus.";
        feedbackEl.className = "feedback bad";
        return;
      }

      const qIndex = activeIndexes[current];
      const correct = questions[qIndex].correct;
      const qPoints = sameSet(picked, correct) ? 1 : 0;
      totalPoints += qPoints;

      const rightTexts = correct.map((i) => questions[qIndex].options[i]).join(" | ");
      if (qPoints === 1) {
        feedbackEl.textContent = round === 2
          ? `Richtig im zweiten Versuch. +1 Punkt. Richtige Antworten: ${rightTexts}`
          : `Perfekt. +1 Punkt. Richtige Antworten: ${rightTexts}`;
        feedbackEl.className = "feedback ok";
      } else {
        markWrongForRound2(qIndex);
        feedbackEl.textContent = `0 Punkte in dieser Frage. Richtige Antworten: ${rightTexts}`;
        feedbackEl.className = "feedback bad";
      }

      checked = true;
      nextBtn.disabled = false;
      updateLiveScore();
    }

    function nextQuestion() {
      if (!checked) {
        const qIndex = activeIndexes[current];
        markWrongForRound2(qIndex);
      }
      current += 1;
      if (current >= activeIndexes.length) {
        if (round === 1 && wrongFromRound1.length > 0) {
          startSecondRound();
          return;
        }
        showResult();
        return;
      }
      renderQuestion();
    }

    function startSecondRound() {
      round = 2;
      activeIndexes = [...wrongFromRound1];
      current = 0;
      checked = false;
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      renderQuestion();
    }

    function showResult() {
      progressEl.textContent = wrongFromRound1.length > 0
        ? `Fertig: 2 Runden abgeschlossen`
        : `Fertig: 1 Runde abgeschlossen`;
      questionEl.textContent = "Quiz abgeschlossen";
      formEl.innerHTML = "";
      imgWrap.style.display = "none";
      feedbackEl.textContent = "";
      checkBtn.disabled = true;
      nextBtn.disabled = true;
      restartBtn.style.display = "inline-block";

      const pct = Math.round((totalPoints / maxPoints) * 100);
      const roundInfo = wrongFromRound1.length
        ? `Runde 2 enthielt ${wrongFromRound1.length} Wiederholungsfragen.`
        : `Alle Fragen waren bereits in Runde 1 richtig.`;
      resultText.textContent = `Du hast ${totalPoints} von ${maxPoints} Punkten erreicht (${pct} %). ${roundInfo}`;
      resultBox.style.display = "block";
      updateLiveScore();
    }

    function restartQuiz() {
      round = 1;
      activeIndexes = questions.map((_, i) => i);
      wrongFromRound1 = [];
      current = 0;
      totalPoints = 0;
      checked = false;
      checkBtn.disabled = false;
      restartBtn.style.display = "none";
      renderQuestion();
    }

    checkBtn.addEventListener("click", checkAnswer);
    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", restartQuiz);

    renderQuestion();
  </script>
</body>
</html>

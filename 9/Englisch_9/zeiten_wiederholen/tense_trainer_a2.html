<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tense Trainer A2+</title>
  <style>
    :root { --bg1:#fff4d8; --bg2:#ffd2b8; --ink:#2a2140; --muted:#6f6789; --card:#fff; --line:#e8ddff; --brand:#ff5f45; --brand2:#ff914d; --violet:#6240d8; --ok:#157347; --okbg:#e9fbf1; --bad:#bf1e2e; --badbg:#ffedf0; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; color: var(--ink); background: radial-gradient(circle at 10% 10%, #ffe8b4 0, transparent 30%), radial-gradient(circle at 88% 14%, #ffd1dd 0, transparent 32%), linear-gradient(160deg, var(--bg1), var(--bg2)); min-height: 100vh; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 1rem; }
    .hero { border-radius: 24px; padding: 1rem 1rem 1.2rem; color: #fff; background: linear-gradient(125deg, rgba(0,0,0,.16), rgba(0,0,0,.08)), linear-gradient(125deg, var(--brand), var(--brand2)); box-shadow: 0 12px 28px rgba(90,38,8,.25); margin-bottom: 1rem; }
    .back { display: inline-block; color: #fff7ee; text-decoration: none; font-weight: 700; font-size: .88rem; margin-bottom: .35rem; }
    h1 { margin: 0; font-size: clamp(1.35rem, 4vw, 2.1rem); line-height: 1.1; }
    .sub { margin-top: .35rem; font-size: .95rem; color: #fff2e9; }
    .links { margin-top: .6rem; display: flex; flex-wrap: wrap; gap: .45rem; }
    .lnk { display: inline-block; padding: .4rem .75rem; border-radius: 999px; background: rgba(255,255,255,.95); border: 1px solid rgba(255,255,255,.45); color: #5b4694; text-decoration: none; font-size: .8rem; font-weight: 700; }
    .ibox { background: var(--card); border: 2px solid var(--line); border-radius: 18px; overflow: hidden; box-shadow: 0 6px 16px rgba(40,25,92,.1); margin-bottom: 1rem; }
    .ihdr { padding: .85rem 1rem; background: linear-gradient(120deg, #6240d8, #8f6eff); color: #fff; font-weight: 700; }
    .ibody { padding: 1rem; }
    .ov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
    .ov-box { border: 1px solid var(--line); background: #f7f4ff; border-radius: 12px; padding: .65rem; }
    .ov-box h3 { margin: 0 0 .35rem; font-size: .78rem; letter-spacing: 1px; text-transform: uppercase; color: var(--violet); }
    .ov-box p { margin: 0; font-size: .88rem; line-height: 1.45; }
    .sig { margin-top: .6rem; border: 1px dashed #d8c8ff; background: #fbf9ff; border-radius: 10px; padding: .55rem; }
    .sig strong { color: var(--violet); font-size: .85rem; }
    .sig ul { margin: .35rem 0 0; padding-left: 1rem; font-size: .86rem; }
    .tabs { display: flex; gap: .4rem; margin-bottom: .8rem; }
    .tab { flex: 1; border: 1px solid #eadfff; border-radius: 12px; background: #ffffffcc; color: #4d3f79; font-weight: 800; padding: .55rem .35rem; cursor: pointer; }
    .tab.active { background: linear-gradient(120deg,#5f3ad7,#9d7bff); color: #fff; }
    .lsec { display: none; } .lsec.show { display: block; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: .6rem; margin-bottom: .75rem; flex-wrap: wrap; }
    .score { display: flex; gap: .45rem; }
    .sn { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: .35rem .65rem; font-weight: 800; font-size: .85rem; }
    .btn { border: 1px solid #d9ccff; border-radius: 999px; background: #fff; padding: .4rem .8rem; font-size: .78rem; font-weight: 800; cursor: pointer; color: #5f4a92; }
    .btn.chk { background: linear-gradient(120deg,#5f3ad7,#835ef7); border-color: #5f3ad7; color: #fff; }
    .card { background: #fff; border: 1.5px solid #e6dbff; border-radius: 14px; padding: .9rem; margin-bottom: .7rem; box-shadow: 0 3px 10px rgba(56,31,132,.08); }
    .exnum { font-size: .65rem; letter-spacing: 1.5px; text-transform: uppercase; color: #7a59da; font-weight: 800; margin-bottom: .4rem; }
    .q { font-size: .92rem; line-height: 1.55; margin-bottom: .55rem; }
    .mc-wrap { display: flex; flex-wrap: wrap; gap: .42rem; margin-bottom: .45rem; }
    .mc { border: 1.5px solid #e0d4ff; border-radius: 999px; background: #faf8ff; padding: .4rem .75rem; font-size: .82rem; font-weight: 700; cursor: pointer; }
    .mc.ok { background: var(--okbg); border-color: #90e0b2; color: var(--ok); }
    .mc.err { background: var(--badbg); border-color: #ffb0bb; color: var(--bad); }
    .gap, .wi { width: 100%; border: 1.5px solid #e0d4ff; border-radius: 10px; background: #fbf9ff; padding: .56rem .7rem; margin-bottom: .55rem; font-size: .9rem; }
    .gap.ok, .wi.ok { border-color: #90e0b2; background: var(--okbg); }
    .gap.err, .wi.err { border-color: #ffb0bb; background: var(--badbg); }
    .fbrow { display: flex; gap: .45rem; flex-wrap: wrap; align-items: center; }
    .fb { font-size: .8rem; font-weight: 800; } .fb.g { color: var(--ok); } .fb.b { color: var(--bad); }
    @media (max-width: 760px) { .tabs { flex-direction: column; } .ov-grid { grid-template-columns: 1fr; } }
  </style>
<style id="global-nav-style">

.global-nav a,.global-nav button{appearance:none;border:1px solid #b8cff8;background:linear-gradient(180deg,#fff,#f3f8ff);color:#12335f;padding:8px 14px;border-radius:999px;font:700 14px/1.1 "Trebuchet MS","Segoe UI",sans-serif;cursor:pointer;text-decoration:none}
.global-nav a:hover,.global-nav button:hover{border-color:#7fb0f0;box-shadow:0 8px 20px rgba(24,65,128,.14)}

</style>
<style id="index-theme-style-tense">
:root{--ix-bg-1:#f4f8ff;--ix-bg-2:#fff1de;--ix-ink:#10203a;--ix-line:#d7e3ff;--ix-card:#fff;--ix-shadow:0 14px 36px rgba(20,49,96,.14)}
body{font-family:"Trebuchet MS","Segoe UI",sans-serif !important;color:var(--ix-ink) !important;background:radial-gradient(circle at 10% 8%,#dce9ff 0%,transparent 42%),radial-gradient(circle at 92% 84%,#ffd8b8 0%,transparent 34%),linear-gradient(130deg,var(--ix-bg-1),var(--ix-bg-2)) !important}

.ihdr{background:linear-gradient(130deg,#0b67d1,#2f8ef6) !important}
.tab.active,.btn.chk{background:linear-gradient(120deg,#0b67d1,#2f8ef6) !important;border-color:#0b67d1 !important}
.lnk{background:rgba(255,255,255,.95) !important;color:#12335f !important;border-color:rgba(255,255,255,.55) !important}
@media (max-width:620px){.wrap{padding:.85rem .8rem 1.8rem !important}.hero{border-radius:18px !important;padding:1rem !important}}
</style>
</head>
<body>
<div class="global-nav" id="global-nav">
  <a id="globalNavHome" href="#">Home</a>
  <button id="globalNavBack" type="button">Zurück</button>
  <div class="spacer">Englisch 9</div>
</div>
  <main class="wrap">
    <section class="hero">
<h1 id="title">Tense</h1>
      <p class="sub">A2+ Training mit Aussagen, Fragen, Verneinungen, Signalwoertern und KI-Hilfe auf Deutsch.</p>
      <div class="links">
<a class="lnk" href="tense_overview_a2.html">Alle Zeiten</a>
      </div>
    </section>

    <section class="ibox">
      <div class="ihdr">Übersicht</div>
      <div class="ibody">
        <div class="ov-grid">
          <div class="ov-box"><h3>Aussagesatz</h3><p id="stForm"></p></div>
          <div class="ov-box"><h3>Verneinung</h3><p id="negForm"></p></div>
          <div class="ov-box"><h3>Frage</h3><p id="qForm"></p></div>
          <div class="ov-box"><h3>Kurzregel</h3><p id="ruleText"></p></div>
        </div>
        <div class="sig"><strong>Signalwoerter</strong><ul id="sigList"></ul></div>
      </div>
    </section>

    <section class="tabs">
      <button class="tab active" onclick="setLevel('a',this)">Level A</button>
      <button class="tab" onclick="setLevel('b',this)">Level B</button>
      <button class="tab" onclick="setLevel('c',this)">Level C</button>
    </section>

    <section id="level-a" class="lsec show">
      <div class="topbar"><div class="score"><div class="sn">OK: <span id="ar">0</span></div><div class="sn">X: <span id="aw">0</span></div></div><button class="btn" onclick="resetA()">Reset</button></div>
      <div id="aList"></div>
    </section>

    <section id="level-b" class="lsec">
      <div class="topbar"><div class="score"><div class="sn">OK: <span id="br">0</span></div><div class="sn">X: <span id="bw">0</span></div></div><button class="btn" onclick="resetB()">Reset</button></div>
      <div id="bList"></div>
    </section>

    <section id="level-c" class="lsec">
      <div class="topbar"><div class="score"><div class="sn">OK: <span id="cr">0</span></div><div class="sn">X: <span id="cw">0</span></div></div><button class="btn" onclick="resetC()">Reset</button></div>
      <div id="cList"></div>
    </section>
  </main>

  <script>
    const DB = {
      present_simple: {
        title: "Present Simple",
        forms: { statement: "She plays.", negation: "She does not play.", question: "Does she play?", rule: "Routinen, Fakten, Gewohnheiten." },
        signals: ["always", "usually", "often", "every day", "on Mondays"],
        a: [
          { q: "Choose the correct routine sentence.", options: ["She goes to school every day.", "She go to school every day.", "She is going to school every day now."], correct: "She goes to school every day." },
          { q: "Which question is correct?", options: ["Does he like music?", "Do he likes music?", "Is he like music?"], correct: "Does he like music?" },
          { q: "Choose the correct negative.", options: ["They do not watch TV on weekdays.", "They not watch TV on weekdays.", "They are not watch TV on weekdays."], correct: "They do not watch TV on weekdays." },
          { q: "Select the correct form.", options: ["My brother plays football.", "My brother play football.", "My brother is play football."], correct: "My brother plays football." },
          { q: "Pick a Present Simple signal word.", options: ["usually", "right now", "yesterday"], correct: "usually" }
        ],
        b: [
          { q: "She {1} to school by bus every day.", answers: ["goes"] },
          { q: "They {1} not {2} meat on Fridays.", answers: ["do", "eat"] },
          { q: "{1} he {2} English at home?", answers: ["does", "speak"] },
          { q: "The shop {1} at 8 o clock.", answers: ["opens"] },
          { q: "I {1} my homework every evening.", answers: ["do"] },
          { q: "We {1} football on Tuesdays.", answers: ["play"] }
        ],
        c: [
          { q: "Write one sentence about your routine.", placeholder: "I usually ...", requiredAny: ["always","usually","often","every day"], minChars: 20, model: "I usually do my homework after school." },
          { q: "Write one Present Simple negative sentence.", placeholder: "I do not ...", requiredAll: ["do not"], minChars: 18, model: "I do not play games on school days." },
          { q: "Write one Present Simple question.", placeholder: "Do/Does ... ?", requiredAny: ["do","does"], minChars: 14, model: "Does your friend like pizza?" },
          { q: "Write 4-5 lines about family habits.", placeholder: "In my family ...", requiredAny: ["usually","often","every day"], minChars: 85, multiline: true, model: "In my family, we usually eat together in the evening. My mother cooks and my father sets the table. My sister often helps with the dishes. I do my homework after dinner. We do not watch TV during meals." }
        ]
      },
      present_progressive: {
        title: "Present Progressive",
        forms: { statement: "She is playing.", negation: "She is not playing.", question: "Is she playing?", rule: "Handlungen genau jetzt." },
        signals: ["now", "right now", "at the moment", "currently", "today"],
        a: [
          { q: "Choose the sentence about now.", options: ["She is reading now.", "She reads now every day.", "She read now."], correct: "She is reading now." },
          { q: "Which question is correct?", options: ["Are they waiting outside?", "Do they waiting outside?", "They are waiting outside?"], correct: "Are they waiting outside?" },
          { q: "Choose the correct negative.", options: ["I am not sleeping at the moment.", "I do not sleeping at the moment.", "I not am sleeping at the moment."], correct: "I am not sleeping at the moment." },
          { q: "Select the correct form.", options: ["He is doing his homework.", "He is do his homework.", "He does his homework now."], correct: "He is doing his homework." },
          { q: "Pick a signal word.", options: ["at the moment", "every Monday", "last week"], correct: "at the moment" }
        ],
        b: [
          { q: "Look! The bus {1}.", answers: ["is coming"] },
          { q: "I {1} not {2} right now.", answers: ["am", "listening"] },
          { q: "{1} they {2} for us?", answers: ["are", "waiting"] },
          { q: "She {1} a message now.", answers: ["is writing"] },
          { q: "We {1} English at the moment.", answers: ["are studying"] },
          { q: "He {1} not {2} football now.", answers: ["is", "playing"] }
        ],
        c: [
          { q: "Write one sentence about what you are doing now.", placeholder: "I am ...", requiredAny: ["am","is","are"], minChars: 18, model: "I am writing an English exercise right now." },
          { q: "Write one Present Progressive question.", placeholder: "Are/Is ... ?", requiredAny: ["are","is"], minChars: 14, model: "Are you using your phone now?" },
          { q: "Write one negative sentence.", placeholder: "... is not / are not ...", requiredAny: ["not"], minChars: 20, model: "My friend is not watching TV at the moment." },
          { q: "Write 4-5 lines about your class now.", placeholder: "In my class ...", requiredAny: ["is","are","now","at the moment"], minChars: 85, multiline: true, model: "In my class, the teacher is explaining grammar. Two students are writing notes. One student is asking a question. I am listening carefully. We are all working quietly right now." }
        ]
      },
      past_simple: {
        title: "Past Simple",
        forms: { statement: "She played yesterday.", negation: "She did not play.", question: "Did she play?", rule: "Abgeschlossene Vergangenheit." },
        signals: ["yesterday", "last week", "ago", "in 2020", "then"],
        a: [
          { q: "Choose a correct Past Simple sentence.", options: ["We visited Berlin last year.", "We visit Berlin last year.", "We are visiting Berlin last year."], correct: "We visited Berlin last year." },
          { q: "Which question is correct?", options: ["Did he call you yesterday?", "Does he called you yesterday?", "Did he called you yesterday?"], correct: "Did he call you yesterday?" },
          { q: "Choose the correct negative.", options: ["I did not see her yesterday.", "I did not saw her yesterday.", "I do not saw her yesterday."], correct: "I did not see her yesterday." },
          { q: "Select correct irregular form.", options: ["go -> went", "go -> goed", "go -> gone yesterday"], correct: "go -> went" },
          { q: "Pick a past signal word.", options: ["last night", "usually", "at the moment"], correct: "last night" }
        ],
        b: [
          { q: "We {1} a film yesterday.", answers: ["watched"] },
          { q: "She {1} not {2} her homework.", answers: ["did", "finish"] },
          { q: "{1} you {2} your friend?", answers: ["did", "call"] },
          { q: "They {1} to school late last Monday.", answers: ["went"] },
          { q: "I {1} breakfast at 7 yesterday.", answers: ["had"] },
          { q: "He {1} not {2} to the party.", answers: ["did", "go"] }
        ],
        c: [
          { q: "Write one sentence about yesterday.", placeholder: "Yesterday, I ...", requiredAny: ["yesterday","last","ago"], minChars: 18, model: "Yesterday, I visited my grandparents." },
          { q: "Write one Past Simple question with Did.", placeholder: "Did ... ?", requiredAll: ["did"], minChars: 14, model: "Did you finish your project yesterday?" },
          { q: "Write one Past Simple negative sentence.", placeholder: "I did not ...", requiredAll: ["did not"], minChars: 18, model: "I did not watch TV last night." },
          { q: "Write 4-5 lines about a day last week.", placeholder: "Last week ...", requiredAny: ["last","yesterday","ago","did"], minChars: 85, multiline: true, model: "Last week, we had a math test on Tuesday. I studied in the afternoon and revised with a friend. After school, I played football for one hour. In the evening, I did my homework. It was a busy day." }
        ]
      },
      past_progressive: {
        title: "Past Progressive",
        forms: { statement: "She was playing at 8 pm.", negation: "She was not playing at 8 pm.", question: "Was she playing at 8 pm?", rule: "Laengere Hintergrundhandlung in der Vergangenheit." },
        signals: ["while", "when", "at 7 pm", "at that moment", "all evening"],
        a: [
          { q: "Choose the correct sentence.", options: ["I was doing homework at 7 pm.", "I did doing homework at 7 pm.", "I am doing homework at 7 pm yesterday."], correct: "I was doing homework at 7 pm." },
          { q: "Which question is correct?", options: ["Were they waiting when you arrived?", "Did they waiting when you arrived?", "Were they waited when you arrived?"], correct: "Were they waiting when you arrived?" },
          { q: "Choose the correct negative.", options: ["She was not sleeping when I called.", "She did not sleeping when I called.", "She not was sleeping when I called."], correct: "She was not sleeping when I called." },
          { q: "Pick the best connector.", options: ["while", "tomorrow", "every day"], correct: "while" },
          { q: "Select the correct form.", options: ["We were watching TV when the phone rang.", "We watched TV when the phone was ringing every day.", "We are watching TV when the phone rang."], correct: "We were watching TV when the phone rang." }
        ],
        b: [
          { q: "At 8 pm, I {1} (study) for the test.", answers: ["was studying"] },
          { q: "They {1} not {2} (listen) in class.", answers: ["were", "listening"] },
          { q: "{1} she {2} (cook) when you arrived?", answers: ["was", "cooking"] },
          { q: "We {1} football while it {2} raining.", answers: ["were playing", "was"] },
          { q: "My brother {1} (sleep) when the alarm rang.", answers: ["was sleeping"] },
          { q: "The students {1} not {2} attention.", answers: ["were", "paying"] }
        ],
        c: [
          { q: "Write one sentence with while in Past Progressive.", placeholder: "While I was ..., ...", requiredAny: ["while","was","were"], minChars: 20, model: "While I was walking home, it started to rain." },
          { q: "Write one Past Progressive question.", placeholder: "Was/Were ... ?", requiredAny: ["was","were"], minChars: 16, model: "Were you studying at 9 pm?" },
          { q: "Write one negative sentence in Past Progressive.", placeholder: "... was not / were not ...", requiredAny: ["not","was","were"], minChars: 22, model: "I was not using my phone during dinner." },
          { q: "Write 4-5 lines about what people were doing yesterday evening.", placeholder: "Yesterday evening ...", requiredAny: ["was","were","when","while"], minChars: 85, multiline: true, model: "Yesterday evening, my mother was cooking dinner. My father was reading the news. I was doing my homework in my room. While I was writing, my sister was watching TV. At 9 pm, we were all getting ready for bed." }
        ]
      },
      present_perfect: {
        title: "Present Perfect",
        forms: { statement: "She has finished her homework.", negation: "She has not finished her homework.", question: "Has she finished her homework?", rule: "Verbindung von Vergangenheit und Gegenwart (Ergebnis/Erfahrung)." },
        signals: ["already", "yet", "just", "since", "for", "ever", "never"],
        a: [
          { q: "Choose the correct sentence.", options: ["I have just finished my homework.", "I just have finish my homework.", "I finished already my homework now."], correct: "I have just finished my homework." },
          { q: "Which question is correct?", options: ["Have you ever been to London?", "Did you ever been to London?", "Have you ever went to London?"], correct: "Have you ever been to London?" },
          { q: "Choose the correct negative.", options: ["She has not seen this film yet.", "She has not saw this film yet.", "She does not seen this film yet."], correct: "She has not seen this film yet." },
          { q: "Pick a Present Perfect signal word.", options: ["already", "yesterday", "at the moment"], correct: "already" },
          { q: "Select the correct form.", options: ["They have lived here for five years.", "They lived here for five years and still now.", "They have live here for five years."], correct: "They have lived here for five years." }
        ],
        b: [
          { q: "I have {1} (just / finish) my project.", answers: ["just finished"] },
          { q: "She {1} not {2} (do) the task yet.", answers: ["has", "done"] },
          { q: "{1} you ever {2} (eat) sushi?", answers: ["have", "eaten"] },
          { q: "We have lived here {1} 2019.", answers: ["since"] },
          { q: "He has worked in this shop {1} three years.", answers: ["for"] },
          { q: "They have {1} (already / arrive).", answers: ["already arrived"] }
        ],
        c: [
          { q: "Write one sentence with just or already.", placeholder: "I have just/already ...", requiredAny: ["have","has","just","already"], minChars: 20, model: "I have already finished my English homework." },
          { q: "Write one Present Perfect question with ever.", placeholder: "Have you ever ... ?", requiredAny: ["have","ever"], minChars: 18, model: "Have you ever visited another country?" },
          { q: "Write one negative sentence with yet.", placeholder: "... has/have not ... yet", requiredAny: ["not","yet","has","have"], minChars: 22, model: "My brother has not cleaned his room yet." },
          { q: "Write 4-5 lines about things you have done this week.", placeholder: "This week, I have ...", requiredAny: ["have","has","already","yet","since","for"], minChars: 85, multiline: true, model: "This week, I have studied for two tests. I have already written my English essay. I have helped my friend with math since Monday. I have not watched much TV yet. I have felt very busy but happy." }
        ]
      },
      will_future: {
        title: "Will Future",
        forms: { statement: "She will play.", negation: "She will not play.", question: "Will she play?", rule: "Spontane Entscheidung, Versprechen, Vorhersage." },
        signals: ["tomorrow", "next week", "I think", "probably", "maybe"],
        a: [
          { q: "Choose a correct will-future sentence.", options: ["I will help you tomorrow.", "I help you tomorrow.", "I am helping you tomorrow now."], correct: "I will help you tomorrow." },
          { q: "Which question is correct?", options: ["Will they come later?", "Do they will come later?", "Will they comes later?"], correct: "Will they come later?" },
          { q: "Choose the correct negative.", options: ["She will not forget your birthday.", "She not will forget your birthday.", "She does not will forget your birthday."], correct: "She will not forget your birthday." },
          { q: "Pick a typical will signal.", options: ["I think", "yesterday", "at the moment"], correct: "I think" },
          { q: "Choose the short negative form.", options: ["won't", "don't", "isn't"], correct: "won't" }
        ],
        b: [
          { q: "I {1} call you after school.", answers: ["will"] },
          { q: "She {1} not {2} late again.", answers: ["will", "be"] },
          { q: "{1} you {2} me with this task?", answers: ["will", "help"] },
          { q: "I think they {1} win the game.", answers: ["will"] },
          { q: "We {1} probably {2} at 8.", answers: ["will", "arrive"] },
          { q: "Tomorrow, I {1} study at home.", answers: ["will"] }
        ],
        c: [
          { q: "Write one promise with will.", placeholder: "I will ...", requiredAll: ["will"], minChars: 16, model: "I will help my friend with homework tomorrow." },
          { q: "Write one prediction with I think ... will ...", placeholder: "I think ... will ...", requiredAll: ["i think","will"], minChars: 20, model: "I think our team will win the next match." },
          { q: "Write one will question.", placeholder: "Will ... ?", requiredAll: ["will"], minChars: 14, model: "Will you join us after school?" },
          { q: "Write 4-5 lines about next week with will.", placeholder: "Next week, I will ...", requiredAll: ["will"], requiredAny: ["next week","tomorrow","probably"], minChars: 85, multiline: true, model: "Next week, I will study for my English test. I will also visit my grandparents on Saturday. I think I will play football with my friends on Sunday. I will not stay up late on school nights. It will be a productive week." }
        ]
      },
      going_to_future: {
        title: "Going to Future",
        forms: { statement: "She is going to play.", negation: "She is not going to play.", question: "Is she going to play?", rule: "Fester Plan oder Vorhersage mit Hinweis." },
        signals: ["tonight", "next weekend", "soon", "in the future", "look!"],
        a: [
          { q: "Choose a correct plan sentence.", options: ["I am going to visit my aunt tonight.", "I will visiting my aunt tonight.", "I go to visit my aunt tonight."], correct: "I am going to visit my aunt tonight." },
          { q: "Which question is correct?", options: ["Are they going to travel next week?", "Do they going to travel next week?", "Are they go to travel next week?"], correct: "Are they going to travel next week?" },
          { q: "Choose the correct negative.", options: ["He is not going to buy a new phone.", "He does not going to buy a new phone.", "He not is going to buy a new phone."], correct: "He is not going to buy a new phone." },
          { q: "Pick a typical signal word.", options: ["tonight", "yesterday", "always"], correct: "tonight" },
          { q: "Which sentence predicts with evidence?", options: ["Look! It is going to rain.", "Look! It rains every day.", "Look! It rained tomorrow."], correct: "Look! It is going to rain." }
        ],
        b: [
          { q: "I {1} going to clean my room tonight.", answers: ["am"] },
          { q: "She {1} not going to {2} out.", answers: ["is", "go"] },
          { q: "{1} they going to {2} football?", answers: ["are", "play"] },
          { q: "We {1} going to visit Berlin next month.", answers: ["are"] },
          { q: "He {1} going to {2} a cake.", answers: ["is", "bake"] },
          { q: "Look! The baby {1} going to cry.", answers: ["is"] }
        ],
        c: [
          { q: "Write one sentence about a fixed plan with going to.", placeholder: "I am going to ...", requiredAll: ["going to"], minChars: 20, model: "I am going to visit my cousin next weekend." },
          { q: "Write one going to question.", placeholder: "Are/Is ... going to ... ?", requiredAll: ["going to"], minChars: 18, model: "Are you going to study tonight?" },
          { q: "Write one negative sentence with going to.", placeholder: "... is not / are not going to ...", requiredAll: ["going to"], requiredAny: ["not"], minChars: 22, model: "She is not going to watch TV this evening." },
          { q: "Write 4-5 lines about your weekend plans with going to.", placeholder: "This weekend, I am going to ...", requiredAll: ["going to"], requiredAny: ["weekend","tonight","soon"], minChars: 85, multiline: true, model: "This weekend, I am going to finish my homework on Friday. On Saturday, I am going to play basketball with friends. In the evening, we are going to watch a film. On Sunday, I am going to visit my grandparents. I am not going to waste my time on my phone." }
        ]
      }
    };

    const params = new URLSearchParams(window.location.search);
    const key = params.get("t") || "present_simple";
    const CFG = DB[key] || DB.present_simple;
    document.title = CFG.title + " | English A2+";
    document.getElementById("title").textContent = CFG.title;

    const ans = {};
    const sc = { a: { r: 0, w: 0 }, b: { r: 0, w: 0 }, c: { r: 0, w: 0 } };
    const E9_TOKEN = localStorage.getItem("e9_token") || "";
    async function syncTenseProgress(){
      if(!E9_TOKEN) return;
      try{
        const total=(CFG.a.length+CFG.b.length+CFG.c.length)||1;
        const done=Object.keys(ans).length;
        const right=sc.a.r+sc.b.r+sc.c.r;
        const wrong=sc.a.w+sc.b.w+sc.c.w;
        const pct=Math.round((right/Math.max(right+wrong,1))*100);
        await fetch((location.hostname.includes('github.io')||location.protocol==='file:'?'https://englisch-9.onrender.com':'') + '/api/progress/record',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+E9_TOKEN},
          body:JSON.stringify({
            exerciseId:'tense-'+(key||'present_simple'),
            exerciseName:(CFG.title||'Tense Trainer')+' A2+',
            unit:'grammar',
            category:'tense-trainer',
            percent:pct,
            score:right,
            total:right+wrong,
            completed:done>=total,
            meta:{done:done,totalItems:total}
          })
        });
      }catch(_e){}
    }
    const nrm = (s) => String(s || "").toLowerCase().replace(/[?.!,']/g, "").replace(/\s+/g, " ").trim();
    function updSc(l){ document.getElementById(l+"r").textContent=sc[l].r; document.getElementById(l+"w").textContent=sc[l].w; }
    function setLevel(l,btn){ document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); document.querySelectorAll(".lsec").forEach(s=>s.classList.remove("show")); document.getElementById("level-"+l).classList.add("show"); }

    function renderOverview(){
      document.getElementById("stForm").textContent = CFG.forms.statement;
      document.getElementById("negForm").textContent = CFG.forms.negation;
      document.getElementById("qForm").textContent = CFG.forms.question;
      document.getElementById("ruleText").textContent = CFG.forms.rule;
      const ul=document.getElementById("sigList");
      CFG.signals.forEach(s=>{const li=document.createElement("li");li.textContent=s;ul.appendChild(li);});
    }

    function renderA(){
      const box=document.getElementById("aList"); box.innerHTML="";
      CFG.a.forEach((t,i)=>{
        const id="a"+(i+1);
        const opts=[...t.options];
        for(let j=opts.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[opts[j],opts[k]]=[opts[k],opts[j]];}
        const card=document.createElement("div"); card.className="card"; card.id=id;
        card.innerHTML='<div class="exnum">Exercise '+(i+1)+'</div><div class="q">'+t.q+'</div><div class="mc-wrap">'+opts.map(o=>'<button class="mc" data-val="'+o.replace(/"/g,"&quot;")+'">'+o+'</button>').join("")+'</div><div class="fbrow"><span class="fb" id="'+id+'f"></span></div>';
        box.appendChild(card);
        card.querySelectorAll(".mc").forEach(btn=>btn.addEventListener("click",()=>chkMC(id,btn,t.correct)));
      });
    }
    function chkMC(id,btn,correct){
      if(ans[id])return; ans[id]=true;
      btn.closest(".mc-wrap").querySelectorAll(".mc").forEach(b=>{b.disabled=true;if(nrm(b.dataset.val)===nrm(correct))b.classList.add("ok");});
      const ok=nrm(btn.dataset.val)===nrm(correct); if(!ok)btn.classList.add("err");
      const fb=document.getElementById(id+"f"); fb.className="fb "+(ok?"g":"b"); fb.textContent=ok?"Correct.":"Answer: "+correct;
      if(ok)sc.a.r++;else sc.a.w++;updSc("a"); syncTenseProgress();
    }

    function renderB(){
      const box=document.getElementById("bList"); box.innerHTML="";
      CFG.b.forEach((t,i)=>{
        const id="b"+(i+1);
        const q=t.q.replace("{1}",'<input class="gap" id="'+id+'g" placeholder="...">').replace("{2}",'<input class="gap" id="'+id+'g2" placeholder="...">');
        const card=document.createElement("div"); card.className="card"; card.id=id;
        card.innerHTML='<div class="exnum">Exercise '+(i+1)+'</div><div class="q">'+q+'</div><div class="fbrow"><button class="btn chk">Check</button><button class="btn">Show</button><button class="btn">KI-Tipp (DE)</button><span class="fb" id="'+id+'f"></span></div><div class="fbrow"><span class="fb" id="'+id+'ai"></span></div>';
        box.appendChild(card);
        const btns=card.querySelectorAll(".btn");
        btns[0].addEventListener("click",()=>chkB(id,t.answers));
        btns[1].addEventListener("click",()=>showB(id,t.answers));
        btns[2].addEventListener("click",()=>aiHintB(id,t.q));
      });
    }
    function chkB(id,answers){
      if(ans[id])return;
      const i1=document.getElementById(id+"g"), i2=document.getElementById(id+"g2");
      const ok1=nrm(i1?i1.value:"")===nrm(answers[0]); const ok2=answers[1]===undefined?true:nrm(i2?i2.value:"")===nrm(answers[1]); const ok=ok1&&ok2;
      if(i1){i1.classList.add(ok1?"ok":"err");i1.disabled=true;} if(i2){i2.classList.add(ok2?"ok":"err");i2.disabled=true;}
      const fb=document.getElementById(id+"f"); fb.className="fb "+(ok?"g":"b"); fb.textContent=ok?"Correct.":"Solution: "+answers.join(" / ");
      ans[id]=true; if(ok)sc.b.r++;else sc.b.w++;updSc("b"); syncTenseProgress();
    }
    function showB(id,answers){
      if(ans[id])return;
      const i1=document.getElementById(id+"g"), i2=document.getElementById(id+"g2");
      if(i1){i1.value=answers[0];i1.classList.add("ok");i1.disabled=true;} if(i2&&answers[1]!==undefined){i2.value=answers[1];i2.classList.add("ok");i2.disabled=true;}
      const fb=document.getElementById(id+"f"); fb.className="fb g"; fb.textContent="-> "+answers.join(" / ");
      ans[id]=true; sc.b.w++;updSc("b"); syncTenseProgress();
    }
    async function aiHintB(id,q){
      const out=document.getElementById(id+"ai"), i1=document.getElementById(id+"g"), i2=document.getElementById(id+"g2");
      const user=[i1?i1.value:"",i2?i2.value:""].filter(Boolean).join(" | ").trim();
      if(!user){out.className="fb b";out.textContent="Bitte erst etwas in die Luecke schreiben.";return;}
      out.className="fb"; out.textContent="KI denkt...";
      try{
        const prompt="Gib einen kurzen deutschen Tipp zu dieser Lueckenaufgabe. Frage: "+q.replace("{1}","___").replace("{2}","___")+" Schuelerantwort: "+user;
        const res=await fetch("https://englisch-9.onrender.com/api/role-model/help",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userText:prompt})});
        if(!res.ok)throw new Error("HTTP "+res.status);
        const data=await res.json(); out.className="fb g"; out.textContent="KI-Tipp: "+(data.hint||"Kein Tipp verfuegbar.");
      }catch(_e){out.className="fb b"; out.textContent="KI nicht erreichbar. Bitte spaeter erneut probieren.";}
    }

    function renderC(){
      const box=document.getElementById("cList"); box.innerHTML="";
      CFG.c.forEach((t,i)=>{
        const id="c"+(i+1);
        const field=t.multiline?'<textarea class="wi" id="'+id+'i" rows="5" placeholder="'+t.placeholder+'"></textarea>':'<input class="wi" id="'+id+'i" type="text" placeholder="'+t.placeholder+'">';
        const card=document.createElement("div"); card.className="card"; card.id=id;
        card.innerHTML='<div class="exnum">Exercise '+(i+1)+'</div><div class="q">'+t.q+'</div>'+field+'<div class="fbrow"><button class="btn chk">Check</button><button class="btn">KI-Hilfe</button><button class="btn">Show</button><span class="fb" id="'+id+'f"></span></div><div class="fbrow"><span class="fb" id="'+id+'ai"></span></div>';
        box.appendChild(card);
        const btns=card.querySelectorAll(".btn");
        btns[0].addEventListener("click",()=>chkC(id,t));
        btns[1].addEventListener("click",()=>aiHelp(id,t));
        btns[2].addEventListener("click",()=>showC(id,t));
      });
    }
    function chkC(id,t){
      if(ans[id])return;
      const inp=document.getElementById(id+"i"), val=nrm(inp.value);
      const okAll=(t.requiredAll||[]).every(r=>val.includes(nrm(r)));
      const okAny=(t.requiredAny||[]).length?(t.requiredAny||[]).some(r=>val.includes(nrm(r))):true;
      const okLen=val.length>=(t.minChars||20), ok=okAll&&okAny&&okLen;
      inp.classList.add(ok?"ok":"err"); inp.disabled=true;
      const fb=document.getElementById(id+"f"); fb.className="fb "+(ok?"g":"b"); fb.textContent=ok?"Great.":"Bitte Aufgabe genauer treffen.";
      ans[id]=true; if(ok)sc.c.r++;else sc.c.w++; updSc("c"); syncTenseProgress();
    }
    async function aiHelp(id,t){
      const inp=document.getElementById(id+"i"), out=document.getElementById(id+"ai"), value=(inp&&inp.value?inp.value:"").trim();
      if(!value){out.className="fb b";out.textContent="Bitte erst einen Text schreiben.";return;}
      out.className="fb"; out.textContent="KI denkt...";
      try{
        const prompt="Zeitform: "+CFG.title+". Aufgabe: "+t.q+" Schuelertext: "+value+" Gib kurze Hilfe auf Deutsch.";
        const res=await fetch("https://englisch-9.onrender.com/api/role-model/help",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userText:prompt})});
        if(!res.ok)throw new Error("HTTP "+res.status);
        const data=await res.json(); out.className="fb g"; out.textContent="KI-Hilfe: "+(data.hint||"Kein Tipp verfuegbar.");
      }catch(_e){out.className="fb b"; out.textContent="KI nicht erreichbar. Bitte spaeter erneut probieren.";}
    }
    function showC(id,t){
      if(ans[id])return;
      const inp=document.getElementById(id+"i"); inp.value=t.model; inp.classList.add("ok"); inp.disabled=true;
      const fb=document.getElementById(id+"f"); fb.className="fb g"; fb.textContent="-> Beispiel angezeigt";
      ans[id]=true; sc.c.w++; updSc("c"); syncTenseProgress();
    }

    function resetA(){sc.a={r:0,w:0};updSc("a"); syncTenseProgress();Object.keys(ans).filter(k=>k.startsWith("a")).forEach(k=>delete ans[k]);renderA();}
    function resetB(){sc.b={r:0,w:0};updSc("b"); syncTenseProgress();Object.keys(ans).filter(k=>k.startsWith("b")).forEach(k=>delete ans[k]);renderB();}
    function resetC(){sc.c={r:0,w:0};updSc("c"); syncTenseProgress();Object.keys(ans).filter(k=>k.startsWith("c")).forEach(k=>delete ans[k]);renderC();}

    renderOverview(); renderA(); renderB(); renderC();
  </script>
<script id="global-nav-script">
(function(){
  function homeUrl(){
    var href=String(window.location.href||'');
    if(href.indexOf('/grumi/9/Englisch_9/')>-1){ return href.split('/grumi/9/Englisch_9/')[0]+'/grumi/9/Englisch_9/index.html'; }
    if(href.indexOf('/Apps_verbessert/')>-1){ return href.split('/Apps_verbessert/')[0]+'/Apps_verbessert/index.html'; }
    if(href.indexOf('/Apps/')>-1){ return href.split('/Apps/')[0]+'/Apps/index.html'; }
    return 'index.html';
  }
  var home=document.getElementById('globalNavHome');
  var back=document.getElementById('globalNavBack');
  if(home){ home.setAttribute('href', homeUrl()); }
  if(back){ back.addEventListener('click', function(){ if(window.history.length>1){ window.history.back(); } else { window.location.href=homeUrl(); } }); }
})();
</script>

<title>Unit 3 Vokabeltrainer - South Africa</title>
<style>
  :root{

    --text:#10203a; --muted:#5c6d8a; --shadow:0 12px 30px rgba(20,49,96,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Trebuchet MS","Segoe UI",sans-serif;min-height:100vh;color:var(--text);padding:1rem;background:
    radial-gradient(circle at 10% 8%, #dce9ff 0%, transparent 42%),
    radial-gradient(circle at 92% 84%, #ffd8b8 0%, transparent 34%),
    linear-gradient(130deg,var(--bg-1),var(--bg-2));}
  .wrap{max-width:940px;margin:0 auto}
  .hero{background:linear-gradient(130deg,var(--blue),var(--blue-2) 52%,var(--orange));color:#fff;border-radius:20px;padding:1rem 1.1rem;box-shadow:var(--shadow)}
  h1{font-size:clamp(1.4rem,4.4vw,2rem);line-height:1.15}
  .sub{opacity:.95;margin-top:.35rem}
  .back{display:inline-block;margin-top:.7rem;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.6);padding:.3rem .65rem;border-radius:999px;font-weight:700}
  .panel{margin-top:.8rem;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:.8rem;box-shadow:var(--shadow)}
  .filter-row{display:flex;flex-wrap:wrap;gap:.35rem;margin:.3rem 0 .5rem}
  .filter-btn{padding:.3rem .65rem;border:1.5px solid #b8cff8;border-radius:999px;background:#fff;color:#234b84;font-size:.78rem;font-weight:700;cursor:pointer}
  .filter-btn.active{background:#eaf2ff;border-color:var(--blue);color:var(--blue)}
  .controls{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin:.45rem 0 .6rem}
  .pill-group{display:flex;background:#eaf2ff;border-radius:999px;padding:3px}
  .pill{padding:.36rem .8rem;border:none;border-radius:999px;background:transparent;color:#40618f;font-weight:700;cursor:pointer;font-size:.8rem}
  .pill.active{background:var(--blue);color:#fff}
  .scorebar{display:flex;justify-content:center;gap:1.4rem;margin:.3rem 0 .8rem;color:var(--muted);font-size:.8rem}
  .scorebar strong{display:block;text-align:center;font-size:1.25rem;color:var(--text)}
  .progress-wrap{max-width:560px;margin:0 auto .9rem;height:7px;background:#d6e3fb;border-radius:4px;overflow:hidden}
  .progress-bar{height:100%;background:var(--blue);width:0%;transition:width .3s}
  .card{max-width:640px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:1rem;box-shadow:var(--shadow)}
  .unit-tag{display:inline-block;background:#ffe6d5;color:#8f3f07;font-size:.72rem;padding:.18rem .55rem;border-radius:999px;font-weight:700}
  .direction-label{text-align:center;color:var(--muted);font-size:.77rem;margin:.5rem 0 .75rem;letter-spacing:.03em}
  .question-word{text-align:center;color:var(--blue);font-size:clamp(1.4rem,5vw,2.2rem);font-weight:800;line-height:1.2}
  .phonetic{text-align:center;color:var(--muted);font-size:.88rem;margin-top:.15rem;font-style:italic;min-height:1.2rem}
  .speak-btn{display:block;margin:.65rem auto .55rem;padding:.33rem .9rem;border:1px solid #b8cff8;background:#fff;border-radius:999px;color:#355f95;font-weight:700;cursor:pointer}
  .audio-row{display:flex;flex-wrap:wrap;justify-content:center;gap:.45rem;margin:.25rem 0 .75rem}
  .example-box{max-width:560px;margin:.2rem auto .75rem;padding:.55rem .7rem;border:1.5px dashed #c8daf9;border-radius:10px;background:#f6f9ff;color:#24456f;font-size:.92rem;min-height:2.2rem}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
  .choice{padding:.75rem .5rem;background:#f4f8ff;border:1.5px solid #d1e1ff;border-radius:10px;text-align:center;cursor:pointer;font-weight:700;color:#20426f}
  .choice.correct{background:#e8f8f0;border-color:#9be3c0;color:var(--ok)}
  .choice.wrong{background:#fdeeee;border-color:#f3b5ae;color:var(--bad)}
  .type-area{display:flex;flex-direction:column;gap:.55rem}
  .type-area input{padding:.8rem .95rem;border:1.5px solid #c6d8f7;border-radius:10px;font-size:1rem;font-weight:700;color:var(--text)}
  .type-area input.correct{background:#e8f8f0;border-color:#9be3c0}
  .type-area input.wrong{background:#fdeeee;border-color:#f3b5ae}
  .btn-row{display:flex;justify-content:center;gap:.55rem;margin-top:.85rem}
  .btn-primary{padding:.62rem 1.25rem;border:none;border-radius:999px;background:var(--blue);color:#fff;font-weight:700;cursor:pointer}
  .btn-secondary{padding:.62rem 1rem;border:1.5px solid #c6d8f7;border-radius:999px;background:#fff;color:#355f95;font-weight:700;cursor:pointer}
  .feedback{text-align:center;min-height:1.4rem;margin-top:.8rem;font-weight:700}
  .feedback.good{color:var(--ok)} .feedback.bad{color:var(--bad)}
  #result{display:none;text-align:center;padding:1rem}
  #result h2{font-size:1.9rem;color:var(--blue)}
  .big-pct{font-size:4rem;font-weight:900;color:var(--orange)}
  @media(max-width:640px){.choices{grid-template-columns:1fr}}
</style>
<style id="global-nav-style">
.global-nav{position:sticky;top:0;z-index:9999;display:flex;gap:10px;align-items:center;padding:10px 14px;background:rgba(12,58,109,.92);backdrop-filter:blur(5px);border-bottom:1px solid rgba(255,255,255,.22)}
.global-nav a,.global-nav button{appearance:none;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.12);color:#fff;padding:8px 14px;border-radius:999px;font:700 14px/1.1 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;cursor:pointer;text-decoration:none}

.global-nav .spacer{margin-left:auto;color:#e4f0ff;font:600 12px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;opacity:.9}
@media (max-width:640px){.global-nav{padding:8px 10px;gap:8px}.global-nav a,.global-nav button{padding:7px 11px;font-size:13px}.global-nav .spacer{display:none}}

</head>

<div class="global-nav" id="global-nav">

<div class="wrap">
  <section class="hero">

    <p class="sub">South Africa · Englisch 9. Klasse</p>
</section>

  <section class="panel">
    <div class="filter-row" id="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">Alle</button>
      <button class="filter-btn" onclick="setFilter('intro',this)">Intro</button>
      <button class="filter-btn" onclick="setFilter('topic1',this)">Topic 1</button>
      <button class="filter-btn" onclick="setFilter('topic2',this)">Topic 2</button>
      <button class="filter-btn" onclick="setFilter('text',this)">Text</button>
      <button class="filter-btn" onclick="setFilter('phrases_ing',this)">Phrases with -ing</button>
      <button class="filter-btn" onclick="setFilter('more_about',this)">More about</button>
      <button class="filter-btn" onclick="setFilter('at_doctors',this)">At the doctor's</button>
      <button class="filter-btn" onclick="setFilter('adjectives_experience',this)">Adjectives</button>
    </div>

    <div class="controls">
      <div class="pill-group">
        <button class="pill active" onclick="setMode('mc',this)">Multiple Choice</button>
        <button class="pill" onclick="setMode('type',this)">Tippen</button>
      </div>
      <div class="pill-group">
        <button class="pill active" onclick="setDir('random',this)">Zufällig</button>
        <button class="pill" onclick="setDir('en-de',this)">EN → DE</button>
        <button class="pill" onclick="setDir('de-en',this)">DE → EN</button>
      </div>
    </div>

    <div class="scorebar">
      <span><strong id="sc-right">0</strong>✅ Richtig</span>
      <span><strong id="sc-wrong">0</strong>❌ Falsch</span>
      <span><strong id="sc-total">0</strong>Gesamt</span>
    </div>

    <div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>

    <div class="card" id="quiz-card">
      <div class="unit-tag" id="unit-tag">Unit 3</div>
      <div class="direction-label" id="dir-label">Englisch → Deutsch</div>
      <div class="question-word" id="qword">-</div>
      <div class="phonetic" id="phonetic"></div>
      <button class="speak-btn" id="speak-btn" onclick="speak()">🔊 anhören</button>
      <div class="audio-row">
        <select id="example-level" class="btn-secondary" style="padding:.45rem .7rem">
          <option value="A2">Level A2</option>
          <option value="A2+" selected>Level A2+</option>
          <option value="B1">Level B1</option>
        </select>
        <select id="example-mode" class="btn-secondary" style="padding:.45rem .7rem">
          <option value="mixed" selected>Gemischt</option>
          <option value="daily">Alltag</option>
          <option value="definition">Worterklärung</option>
          <option value="paraphrase">Umschreibung</option>
        </select>
        <button class="btn-secondary" id="example-btn" onclick="generateExampleSentence()">🧠 Beispielsatz</button>
        <button class="btn-secondary" id="example-speak-btn" onclick="speakExampleSentence()" disabled>🔊 Satz anhören</button>
      </div>
      <div class="example-box" id="example-box">Klicke auf „Beispielsatz“, um einen KI-Satz zum Wort zu bekommen.</div>

      <div id="mc-area"><div class="choices" id="choices"></div></div>
      <div id="type-area" style="display:none">
        <div class="type-area">
          <input type="text" id="type-input" placeholder="Deine Antwort ..." autocomplete="off" onkeydown="if(event.key==='Enter')checkType()">
          <div style="display:flex;gap:.5rem">
            <button class="btn-secondary" id="hint-btn" onclick="showHint()">💡 Tipp</button>
            <button class="btn-primary" onclick="checkType()">Prüfen</button>
          </div>
        </div>
      </div>

      <div class="feedback" id="feedback"></div>
      <div class="btn-row">
        <button class="btn-secondary" id="skip-btn" onclick="skip()">Überspringen</button>
        <button class="btn-primary" id="next-btn" onclick="nextCard()" style="display:none">Weiter</button>
      </div>
    </div>

    <div id="result">
      <h2>Runde beendet</h2>
      <div class="big-pct" id="pct-display">0%</div>
      <button class="btn-primary" onclick="restart()">Nochmal</button>
    </div>
  </section>
</div>

  {en:"worried",de:"beunruhigt; besorgt",pron:"ˈwʌrid",topic:"adjectives_experience"}
];

let mode='mc', dirSetting='random', filterTopic='all';
let queue=[], current=null, right=0, wrong=0, direction='en-de', answered=false;
let ttsUnlocked = false;
let fallbackAudio = null;
let currentExampleSentence = "";
let currentExampleSource = "";
const exampleHistory = {};
const API_BASE = (location.hostname.includes('github.io') || location.protocol === 'file:') ? 'https://englisch-9.onrender.com' : '';

const E9_TOKEN = localStorage.getItem('e9_token') || '';

async function sendVocabProgress(percent,total){
  if(!E9_TOKEN) return;
  try{
    await fetch(API_BASE + '/api/progress/record',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+E9_TOKEN},
      body:JSON.stringify({
        exerciseId:'unit3-vokabeltrainer',
        exerciseName:'Unit 3 Vokabeltrainer',
        unit:'unit3',
        category:'vocabulary',
        percent:percent,
        score:right,
        total:total,
        completed:true,
        meta:{mode:mode,direction:dirSetting,topic:filterTopic}
      })
    });
  }catch(_e){}
}

const shuffle = a => [...a].sort(()=>Math.random()-0.5);
const filteredVocab = () => filterTopic==='all' ? vocab : vocab.filter(v=>v.topic===filterTopic);

function setMode(m, btn){
  mode=m;
  document.querySelectorAll('.pill').forEach(b=>{ if(b.textContent.includes('Choice')||b.textContent.includes('Tippen')) b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('mc-area').style.display   = m==='mc'?'block':'none';
  document.getElementById('type-area').style.display = m==='type'?'block':'none';
  restart();
}
function setDir(d, btn){
  dirSetting=d;
  document.querySelectorAll('.pill').forEach(b=>{ if(b.textContent.includes('→')||b.textContent.includes('Zufällig')) b.classList.remove('active');});
  btn.classList.add('active');
  restart();
}
function setFilter(f, btn){
  filterTopic=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  restart();
}

function restart(){
  right=0; wrong=0; updateScore();
  queue=shuffle(filteredVocab());
  document.getElementById('result').style.display='none';
  document.getElementById('quiz-card').style.display='block';
  document.querySelector('.progress-wrap').style.display='block';
  nextCard();
}

function nextCard(){
  if(queue.length===0){ showResult(); return; }
  current = queue.pop();
  answered=false;

  direction = dirSetting==='random' ? (Math.random()>0.5?'en-de':'de-en') : dirSetting;
  const isEnDe = direction==='en-de';
  const qWord = isEnDe ? current.en : current.de;
  const aWord = isEnDe ? current.de : current.en;

  document.getElementById('dir-label').textContent = isEnDe ? 'Englisch → Deutsch' : 'Deutsch → Englisch';
  document.getElementById('qword').textContent = qWord;
  document.getElementById('phonetic').textContent = current.pron ? '[' + current.pron + ']' : '';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('skip-btn').style.display='';
  document.getElementById('next-btn').style.display='none';

  const map={intro:"Intro",topic1:"Topic 1",topic2:"Topic 2",text:"Text",phrases_ing:"Phrases with -ing",more_about:"More about",at_doctors:"At the doctor's",adjectives_experience:"Adjectives"};
  document.getElementById('unit-tag').textContent = map[current.topic] || 'Unit 3';

  const sBtn=document.getElementById('speak-btn');
  sBtn.textContent='🔊 anhören';
  const exBtn = document.getElementById('example-speak-btn');
  const exBox = document.getElementById('example-box');
  currentExampleSentence = "";
  currentExampleSource = "";
  if(exBtn) exBtn.disabled = true;
  if(exBox) exBox.textContent = 'Klicke auf „Beispielsatz“, um einen KI-Satz zum Wort zu bekommen.';

  updateProgress();
  if(mode==='mc') buildChoices(aWord,isEnDe);
  else {
    const inp=document.getElementById('type-input');
    inp.value=''; inp.className=''; inp.disabled=false;
    document.getElementById('hint-btn').disabled=false;
    setTimeout(()=>inp.focus(),80);
  }
}

function buildChoices(correct,isEnDe){
  const pool=shuffle(filteredVocab().filter(v=>v!==current)).slice(0,3);
  const opts=shuffle([correct,...pool.map(v=>isEnDe?v.de:v.en)]);
  const cont=document.getElementById('choices'); cont.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice'; btn.textContent=opt;
    btn.onclick=()=>checkChoice(btn,opt,correct);
    cont.appendChild(btn);
  });
}

async function generateExampleSentence(){
  if(!current) return;
  const word = current.en;
  const meaning = current.de || "";
  const topic = current.topic || "topic2";
  const level = String((document.getElementById('example-level') || {}).value || 'A2+');
  const sentenceMode = String((document.getElementById('example-mode') || {}).value || 'mixed');
  const historyKey = (word + '|' + level).toLowerCase();
  const previous = Array.isArray(exampleHistory[historyKey]) ? exampleHistory[historyKey] : [];
  const exBtn = document.getElementById('example-btn');
  const exSpeakBtn = document.getElementById('example-speak-btn');
  const exBox = document.getElementById('example-box');
  if(exBtn) exBtn.disabled = true;
  if(exBox) exBox.textContent = 'KI erstellt Beispielsatz...';

  try{
    const response = await fetch(API_BASE + '/api/vocab/example', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(E9_TOKEN ? { 'Authorization': 'Bearer ' + E9_TOKEN } : {})
      },
      body: JSON.stringify({
        word,
        meaning,
        topic,
        level: level,
        sentenceMode,
        provider: 'anthropic',
        classLevel: 'grade9',
        variationSeed: Date.now(),
        previousSentences: previous.slice(-5)
      })
    });

    if(!response.ok){
      throw new Error('HTTP ' + response.status);
    }
    const data = await response.json();
    let sentence = String(data?.sentence || '').trim();
    currentExampleSource = String(data?.source || '');
    if(!sentence) throw new Error('Kein Satz erhalten');
    if(previous.includes(sentence)){
      const response2 = await fetch(API_BASE + '/api/vocab/example', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(E9_TOKEN ? { 'Authorization': 'Bearer ' + E9_TOKEN } : {})
        },
        body: JSON.stringify({
          word,
          meaning,
          topic,
          level: level,
          sentenceMode,
          provider: 'anthropic',
          classLevel: 'grade9',
          variationSeed: Date.now() + 1,
          previousSentences: previous.concat([sentence]).slice(-6)
        })
      });
      if(response2.ok){
        const data2 = await response2.json();
        const s2 = String(data2?.sentence || '').trim();
        if(s2 && !previous.includes(s2)) sentence = s2;
      }
    }
    currentExampleSentence = sentence;
    exampleHistory[historyKey] = previous.concat([sentence]).slice(-8);
    if(exBox) exBox.textContent = sentence + (currentExampleSource ? (' [' + currentExampleSource + ']') : '');
    if(exSpeakBtn) exSpeakBtn.disabled = false;
  }catch(error){
    const fallback = buildLocalExampleSentence(word, topic, level, sentenceMode, previous);
    currentExampleSource = 'local-fallback';
    currentExampleSentence = fallback;
    exampleHistory[historyKey] = previous.concat([fallback]).slice(-8);
    if(exBox) exBox.textContent = fallback + ' [local-fallback]';
    if(exSpeakBtn) exSpeakBtn.disabled = false;
  }finally{
    if(exBtn) exBtn.disabled = false;
  }
}

function buildLocalExampleSentence(word, topic, level, mode, previous){
  const w = String(word || 'word').trim();
  const p = Array.isArray(previous) ? previous : [];
  const modeKey = String(mode || 'mixed').toLowerCase();
  const packs = {
    daily: [
      `I used "${w}" when talking to my friend after school.`,
      `Today I heard "${w}" in a normal daily situation.`,
      `In class, we used "${w}" in a short dialogue.`
    ],
    definition: [
      `"${w}" is a useful word we learn in Unit 4.`,
      `A simple definition of "${w}" helps me remember it.`,
      `"${w}" is an important term in this topic.`
    ],
    paraphrase: [
      `Another way to explain "${w}" is with easy words.`,
      `I can paraphrase "${w}" in a short sentence.`,
      `We described "${w}" in different words today.`
    ],
    mixed: [
      `We used "${w}" in a short speaking exercise today.`,
      `My partner explained "${w}" with an everyday example.`,
      `I wrote one clear sentence with "${w}" in class.`
    ]
  };
  let pool = packs[modeKey] || packs.mixed;
  if(String(level).toUpperCase() === 'B1'){
    pool = pool.concat([
      `I used "${w}" confidently while explaining my opinion.`,
      `During discussion, "${w}" helped me express my idea clearly.`
    ]);
  }
  const filtered = pool.filter(s => !p.includes(s));
  const use = filtered.length ? filtered : pool;
  const idx = Math.floor(Math.random() * use.length);
  return use[idx];
}

async function speakTextViaAzure(text){
  const res = await fetch(API_BASE + '/api/speech/speak', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      ...(E9_TOKEN ? { 'Authorization': 'Bearer ' + E9_TOKEN } : {})
    },
    body: JSON.stringify({ text, voice: 'en-US-JennyNeural' })
  });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  await new Promise((resolve,reject)=>{
    const audio = new Audio(url);
    audio.onended = () => { URL.revokeObjectURL(url); resolve(true); };
    audio.onerror = () => { URL.revokeObjectURL(url); reject(new Error('audio-error')); };
    const p = audio.play();
    if(p && typeof p.then === 'function'){
      p.catch(reject);
    }
  });
}

async function speakExampleSentence(){
  if(!current) return;
  if(!currentExampleSentence){
    await generateExampleSentence();
  }
  if(!currentExampleSentence) return;
  const fb = document.getElementById("feedback");
  try{
    await speakTextViaAzure(currentExampleSentence);
  }catch(_e){
    try{
      const u = new SpeechSynthesisUtterance(currentExampleSentence);
      u.lang = "en-US";
      u.rate = 0.92;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }catch(_e2){
      if(fb){
        fb.className = "feedback bad";
        fb.textContent = "Satz-Audio nicht verfuegbar.";
      }
    }
  }
}

function checkChoice(btn,chosen,correct){
  if(answered) return;
  answered=true;
  document.querySelectorAll('.choice').forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('correct');});
  if(chosen===correct){ btn.classList.add('correct'); showFeedback(true); right++; speak(); }
  else { btn.classList.add('wrong'); showFeedback(false,correct); wrong++; }
  updateScore(); showNextBtn();
}

function showHint(){
  if(answered) return;
  const correct = direction==='en-de' ? current.de : current.en;
  const first = correct.split(';')[0].trim();
  const inp = document.getElementById('type-input');
  const nextLen = inp.value.length + 1;
  inp.value = first.substring(0,nextLen);
  if(nextLen>=first.length) document.getElementById('hint-btn').disabled=true;
  inp.focus();
}

function checkType(){
  if(answered) return;
  const inp=document.getElementById('type-input');
  const val=inp.value.trim();
  const correct = direction==='en-de' ? current.de : current.en;
  const norm=s=>s.trim().toLowerCase().replace(/^to\s+/,'');
  const vars=correct.split(/[;,]/).map(norm).filter(Boolean);
  const ok=vars.some(v=>norm(val)===v);
  answered=true; inp.disabled=true; document.getElementById('hint-btn').disabled=true;
  if(ok){ inp.classList.add('correct'); showFeedback(true); right++; speak(); }
  else { inp.classList.add('wrong'); showFeedback(false,correct); wrong++; }
  updateScore(); showNextBtn();
}

function showNextBtn(){ document.getElementById('skip-btn').style.display='none'; document.getElementById('next-btn').style.display=''; }
function skip(){ if(answered) return; answered=true; const c=direction==='en-de'?current.de:current.en; showFeedback(false,c); wrong++; updateScore(); showNextBtn(); }
function showFeedback(ok,correct){ const el=document.getElementById('feedback'); el.className='feedback '+(ok?'good':'bad'); el.textContent=ok?'✅ Richtig!':'❌ Richtig: '+correct; }
function unlockTTS(){
  if (ttsUnlocked || !("speechSynthesis" in window) || typeof SpeechSynthesisUtterance === "undefined") return;
  try{
    const warmup = new SpeechSynthesisUtterance(" ");
    warmup.volume = 0;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(warmup);
    ttsUnlocked = true;
  }catch(e){}
}

function getEnglishVoice(){
  if (!("speechSynthesis" in window)) return null;
  const voices = window.speechSynthesis.getVoices() || [];
  if (!voices.length) return null;
  return (
    voices.find(v => /en-GB/i.test(v.lang)) ||
    voices.find(v => /en-US/i.test(v.lang)) ||
    voices.find(v => /^en/i.test(v.lang)) ||
    null
  );
}

function playAudioFallback(text){
  return new Promise((resolve, reject) => {
    try{
      if(!fallbackAudio){
        fallbackAudio = new Audio();
      }
      const q = encodeURIComponent(text);
      fallbackAudio.src = "https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=" + q;
      fallbackAudio.onended = () => resolve(true);
      fallbackAudio.onerror = () => reject(new Error("audio-fallback-error"));
      const p = fallbackAudio.play();
      if (p && typeof p.then === "function") {
        p.then(() => resolve(true)).catch(reject);
      }
    }catch(e){
      reject(e);
    }
  });
}

function speak(){
  if(!current) return;
  const fb = document.getElementById("feedback");
  const btn = document.getElementById("speak-btn");
  const word = current.en;

  btn.textContent = "🔊 laedt ...";
  speakTextViaAzure(word)
    .then(() => {
      btn.textContent = "🔊 anhören";
    })
    .catch(async () => {
      btn.textContent = "🔊 anhören";

      if(!("speechSynthesis" in window) || typeof SpeechSynthesisUtterance === "undefined"){
        fb.className = "feedback bad";
        fb.textContent = "Audio wird von diesem Browser nicht unterstützt.";
        return;
      }

      unlockTTS();

      const u = new SpeechSynthesisUtterance(current.en);
      const voice = getEnglishVoice();
      u.lang = voice ? voice.lang : "en-US";
      if (voice) u.voice = voice;
      u.rate = 0.9;
      u.pitch = 1;
      let started = false;
      let fallbackTimer = null;

      u.onstart = () => {
        started = true;
        if (fallbackTimer) clearTimeout(fallbackTimer);
        btn.textContent = "🔊 läuft ...";
      };
      u.onend = () => {
        if (fallbackTimer) clearTimeout(fallbackTimer);
        btn.textContent = "🔊 anhören";
      };
      u.onerror = async () => {
        if (fallbackTimer) clearTimeout(fallbackTimer);
        btn.textContent = "🔊 anhören";
        try{
          await playAudioFallback(current.en);
          fb.className = "feedback good";
          fb.textContent = "Audio über Fallback abgespielt.";
        }catch(e){
          fb.className = "feedback bad";
          fb.textContent = "Audio blockiert. Bitte Lautlosmodus aus und Lautstärke prüfen.";
        }
      };

      try{
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
        fallbackTimer = setTimeout(async () => {
          if (started) return;
          try{
            await playAudioFallback(current.en);
            fb.className = "feedback good";
            fb.textContent = "Audio über Fallback abgespielt.";
          }catch(e){
            fb.className = "feedback bad";
            fb.textContent = "Kein Audio. Bitte Safari/Chrome nutzen und Lautlosmodus aus.";
          }finally{
            btn.textContent = "🔊 anhören";
          }
        }, 1000);
      }catch(e){
        playAudioFallback(current.en)
          .then(() => {
            fb.className = "feedback good";
            fb.textContent = "Audio über Fallback abgespielt.";
          })
          .catch(() => {
            fb.className = "feedback bad";
            fb.textContent = "Audio konnte nicht gestartet werden.";
          })
          .finally(() => {
            btn.textContent = "🔊 anhören";
          });
      }
    });
}
function updateScore(){ document.getElementById('sc-right').textContent=right; document.getElementById('sc-wrong').textContent=wrong; document.getElementById('sc-total').textContent=right+wrong; }
function updateProgress(){ const total=filteredVocab().length||1; document.getElementById('pbar').style.width=((total-queue.length)/total*100)+'%'; }
function showResult(){ document.getElementById('quiz-card').style.display='none'; document.querySelector('.progress-wrap').style.display='none'; const total=(right+wrong)||1; const pct=Math.round(right/total*100); document.getElementById('pct-display').textContent=pct+'%'; document.getElementById('result').style.display='block'; sendVocabProgress(pct,total); }

window.addEventListener("pointerdown", unlockTTS, { once: true });
if ("speechSynthesis" in window) {
  window.speechSynthesis.onvoiceschanged = () => {};
}

restart();

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Holidays Mr. Moessner - South Africa 2026</title>
  <style>
    :root {
      --sand: #f8edd8;
      --sun: #ffb661;
      --ocean: #0f4c81;
      --ocean-2: #1e6da8;
      --sky: #e7f3ff;
      --ink: #11223a;
      --muted: #445774;
      --card: #ffffff;
      --line: #c8ddf6;
      --shadow: 0 16px 34px rgba(14, 47, 94, 0.22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, #ffe3be 0%, transparent 38%),
        radial-gradient(circle at 84% 88%, #cde7ff 0%, transparent 42%),
        linear-gradient(140deg, var(--sand), var(--sky));
    }
    .wrap {
      max-width: 1260px;
      margin: 0 auto;
      padding: 1rem 1rem 2.1rem;
    }
    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      background: linear-gradient(132deg, #0a3f6d, #0f5f98 54%, #ef9445);
      color: #fff;
      box-shadow: var(--shadow);
      padding: 1.15rem 1.15rem 1.25rem;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(1.45rem, 2.8vw, 2.45rem);
      line-height: 1.2;
      position: relative;
      z-index: 1;
    }
    .hero p {
      margin: 0.46rem 0 0;
      max-width: 60ch;
      color: #f3f8ff;
      position: relative;
      z-index: 1;
    }
    .hero-actions {
      margin-top: 0.78rem;
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .pill {
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      padding: 0.42rem 0.85rem;
      font-weight: 700;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
    }
    .pill .yt-icon {
      display: inline-grid;
      place-items: center;
      width: 1.1rem;
      height: 1.1rem;
      margin-right: 0.42rem;
      border-radius: 4px;
      background: #ff1f1f;
      color: #fff;
      font-size: 0.64rem;
      line-height: 1;
      vertical-align: middle;
    }    .hero::after {
      content: "";
      position: absolute;
      right: -70px;
      top: -65px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.25), rgba(255,255,255,0));
      pointer-events: none;
    }
    .panel {
      margin-top: 1rem;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 0.95rem;
    }
    .panel-head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.6rem;
      margin-bottom: 0.65rem;
      align-items: center;
    }
    .panel-title {
      margin: 0;
      font-size: 1.22rem;
      color: #0e3f73;
    }
    .panel-sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .slideshow {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #afd0f8;
      background: #d5e9ff;
      min-height: min(62vh, 560px);
    }
    .slideshow img {
      width: 100%;
      height: min(62vh, 560px);
      object-fit: cover;
      display: block;
    }
    .caption {
      position: absolute;
      left: 0.7rem;
      right: 0.7rem;
      bottom: 0.7rem;
      border-radius: 14px;
      padding: 0.6rem 0.75rem;
      color: #fff;
      background: linear-gradient(180deg, rgba(8, 26, 47, 0.15), rgba(8, 26, 47, 0.74));
      backdrop-filter: blur(2px);
    }
    .caption strong {
      display: block;
      font-size: 1rem;
    }
    .caption span {
      font-size: 0.88rem;
      opacity: 0.92;
    }
    .controls {
      margin-top: 0.72rem;
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
    }
    .controls button {
      border: 1px solid #98c4f5;
      background: linear-gradient(180deg, #ffffff, #e8f2ff);
      color: #123f70;
      border-radius: 999px;
      padding: 0.46rem 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
    .gallery {
      margin-top: 0.75rem;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.72rem;
    }
    .card {
      margin: 0;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #b9d4f5;
      background: #edf5ff;
      box-shadow: 0 10px 20px rgba(14, 65, 130, 0.13);
      cursor: zoom-in;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 28px rgba(14, 65, 130, 0.18);
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: #d8e9ff;
    }
    .card figcaption {
      padding: 0.55rem 0.62rem 0.64rem;
    }
    .cap-title {
      margin: 0;
      font-size: 0.91rem;
      color: #133761;
      font-weight: 700;
    }
    .cap-sub {
      margin: 0.2rem 0 0;
      font-size: 0.82rem;
      color: #496183;
    }
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(5, 12, 24, 0.88);
      display: none;
      place-items: center;
      padding: 1rem;
      z-index: 12000;
    }
    .lightbox.open { display: grid; }
    .lb-inner {
      width: min(1100px, 100%);
      max-height: 92vh;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 14px;
      overflow: hidden;
      background: #08172b;
      box-shadow: 0 22px 52px rgba(0,0,0,0.45);
    }
    .lb-image-wrap {
      background: #030c17;
      display: grid;
      place-items: center;
      max-height: calc(92vh - 130px);
    }
    .lb-image-wrap img {
      max-width: 100%;
      max-height: calc(92vh - 130px);
      display: block;
    }
    .lb-foot {
      padding: 0.65rem 0.75rem 0.75rem;
      color: #e7f0ff;
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
      background: #10243f;
    }
    .lb-foot p {
      margin: 0;
      font-size: 0.93rem;
    }
    .lb-controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .lb-controls button {
      border: 1px solid rgba(255,255,255,0.38);
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 999px;
      padding: 0.42rem 0.78rem;
      font-weight: 700;
      cursor: pointer;
    }
    @media (max-width: 1120px) {
      .gallery { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 820px) {
      .gallery { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card img { height: 180px; }
    }
    @media (max-width: 560px) {
      .wrap { padding: 0.8rem 0.72rem 1.6rem; }
      .hero { border-radius: 18px; }
      .panel { border-radius: 16px; padding: 0.75rem; }
      .gallery { grid-template-columns: 1fr; }
      .card img { height: 220px; }
      .slideshow img { height: 44vh; }
    }
  </style>
</head>

    function subtitleFromName(name) {
      return captionByFile[name] || "South Africa holiday memory from 2026.";
    }

    const items = imageFiles.map((file, idx) => {
      const encoded = encodeURIComponent(file);
      return {
        file,
        fullSrc: "../privat_images/" + encoded,
        thumbSrc: "./holidays_thumbs/" + encoded,
        title: "South Africa Memory #" + String(idx + 1).padStart(2, "0"),
        subtitle: subtitleFromName(file)
      };
    });

    const galleryEl = document.getElementById("gallery");
    const heroImg = document.getElementById("heroImage");
    const heroTitle = document.getElementById("heroTitle");
    const heroSub = document.getElementById("heroSub");

    let current = 0;
    let heroTimer = null;
    let heroPlaying = true;

    function renderHero() {
      const it = items[current];
      heroImg.src = it.thumbSrc;
      heroImg.alt = it.title;
      heroTitle.textContent = it.title;
      heroSub.textContent = it.subtitle;
    }

    function next(step = 1) {
      current = (current + step + items.length) % items.length;
      renderHero();
    }

    function startHero() {
      stopHero();
      heroTimer = setInterval(() => next(1), 3600);
      heroPlaying = true;
      document.getElementById("toggleHero").textContent = "Pause Auto";
    }

    function stopHero() {
      if (heroTimer) clearInterval(heroTimer);
      heroTimer = null;
      heroPlaying = false;
      document.getElementById("toggleHero").textContent = "Resume Auto";
    }

    items.forEach((it, idx) => {
      const fig = document.createElement("figure");
      fig.className = "card";
      fig.innerHTML = '<img loading="lazy" decoding="async" src="' + it.thumbSrc + '" alt="' + it.title + '"><figcaption><p class="cap-title">' + it.title + '</p><p class="cap-sub">' + it.subtitle + '</p></figcaption>';
      fig.addEventListener("click", () => openLightbox(idx));
      galleryEl.appendChild(fig);
    });

    document.getElementById("prevHero").addEventListener("click", () => { next(-1); if (heroPlaying) startHero(); });
    document.getElementById("nextHero").addEventListener("click", () => { next(1); if (heroPlaying) startHero(); });
    document.getElementById("toggleHero").addEventListener("click", () => { if (heroPlaying) stopHero(); else startHero(); });

    const lb = document.getElementById("lightbox");
    const lbImg = document.getElementById("lbImage");
    const lbCaption = document.getElementById("lbCaption");
    let lbIndex = 0;
    let lbTimer = null;

    function renderLightbox() {
      const it = items[lbIndex];
      lbImg.src = it.fullSrc;
      lbImg.alt = it.title;
      lbCaption.textContent = it.title + " - " + it.subtitle;
    }

    function openLightbox(idx) {
      lbIndex = idx;
      renderLightbox();
      lb.classList.add("open");
      lb.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      lb.classList.remove("open");
      lb.setAttribute("aria-hidden", "true");
      stopLightboxPlay();
    }

    function stepLightbox(dir) {
      lbIndex = (lbIndex + dir + items.length) % items.length;
      renderLightbox();
    }

    function startLightboxPlay() {
      stopLightboxPlay();
      lbTimer = setInterval(() => stepLightbox(1), 2900);
      document.getElementById("lbPlay").textContent = "Pause";
    }

    function stopLightboxPlay() {
      if (lbTimer) clearInterval(lbTimer);
      lbTimer = null;
      document.getElementById("lbPlay").textContent = "Play";
    }

    document.getElementById("lbPrev").addEventListener("click", () => stepLightbox(-1));
    document.getElementById("lbNext").addEventListener("click", () => stepLightbox(1));
    document.getElementById("lbClose").addEventListener("click", closeLightbox);
    const openBtn = document.getElementById("openSlideshow"); if (openBtn) { openBtn.addEventListener("click", () => { openLightbox(current); startLightboxPlay(); }); }
    document.getElementById("lbPlay").addEventListener("click", () => { if (lbTimer) stopLightboxPlay(); else startLightboxPlay(); });

    lb.addEventListener("click", (e) => { if (e.target === lb) closeLightbox(); });

    window.addEventListener("keydown", (e) => {
      if (!lb.classList.contains("open")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowRight") stepLightbox(1);
      if (e.key === "ArrowLeft") stepLightbox(-1);
      if (e.key === " ") {
        e.preventDefault();
        if (lbTimer) stopLightboxPlay(); else startLightboxPlay();
      }
    });

    renderHero();
    startHero();
  </script>

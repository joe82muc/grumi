<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fachseite | Kommt demnächst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div>
        <h1 id="title">Fachseite</h1>
        <small id="context">Die Seite wird geladen...</small>
      </div>
    </div>
  </header>

  <main class="wrapper single">
    <section class="panel">
      <div class="content">
        <h2>Kommt demnächst</h2>
        <p>Diese Fachseite ist aktuell noch nicht verfügbar. Die Inhalte werden zeitnah bereitgestellt.</p>
        <p><a class="subject" href="index.html">Zurück zur Lernplattform</a></p>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const klasse = params.get("klasse") || "unbekannt";
    const fach = (params.get("fach") || "Fach").replaceAll("-", " ");
    document.getElementById("title").textContent = `Klasse ${klasse} | ${fach}`;
    document.getElementById("context").textContent = `Ausgewählt: Klasse ${klasse}, Fach ${fach}.`;
  </script>
</body>
</html>
